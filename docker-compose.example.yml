services:
  bookshelf:
    image: trstyq/bookshelf:latest
    container_name: bookshelf
    restart: unless-stopped
    ports:
      - "25647:25647"
    environment:
      SERVER_PORT: "25647"
      REGISTRATION: "false"
      ALADIN_TTB_KEY: ""
      # Required stable random key. Generate one before `docker compose up`,
      # for example: export APP_REMEMBER_ME_KEY="$(openssl rand -hex 32)"
      APP_REMEMBER_ME_KEY: "${APP_REMEMBER_ME_KEY:?APP_REMEMBER_ME_KEY must be set}"
      BOOKSHELF_COVER_DIR: "/data/covers"
      # Set true only when serving through HTTPS. Keep false for direct HTTP/local access.
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - bookshelf-data:/data

volumes:
  bookshelf-data:
