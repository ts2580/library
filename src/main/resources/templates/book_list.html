<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('책장 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-shell bookshelf-shell-wide bookshelf-py-8">
  <div class="bookshelf-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('books')}"></aside>
    <nav th:replace="~{fragments/layout :: appMobileNav('books')}"></nav>
    <main class="bookshelf-main">
      <div th:replace="~{fragments/layout :: appTopbar(null, '내 책장', null)}"></div>
      <div th:replace="~{fragments/layout :: flashMessages(${success}, ${error})}"></div>

      <div class="flex justify-end bookshelf-px-4 gap-2">
        <button id="openBookCreateDialog" type="button" class="bookshelf-btn h-11 bookshelf-px-4 bookshelf-btn-size-sm sm:w-auto">책 수동 추가</button>
      </div>

      <section class="bookshelf-card bookshelf-p-4 sm:bookshelf-p-4">
        <form action="/books" method="get" class="grid bookshelf-gap-3 sm:grid-cols-2 xl:grid-cols-4">
          <div>
            <label class="bookshelf-mb-2 block bookshelf-form-label" for="bookTypeFilter">카테고리</label>
            <input id="bookTypeFilter" name="type" list="book-category-options" th:value="${type}" placeholder="전체 카테고리" class="bookshelf-input h-11 w-full bookshelf-px-4 text-sm">
          </div>
          <div>
            <label class="bookshelf-mb-2 block bookshelf-form-label" for="bookAuthorFilter">작가</label>
            <input id="bookAuthorFilter" type="text" name="author" th:value="${author}" placeholder="작가명" class="bookshelf-input h-11 w-full bookshelf-px-4 text-sm">
          </div>
          <div>
            <label class="bookshelf-mb-2 block bookshelf-form-label" for="bookTitleFilter">제목</label>
            <input id="bookTitleFilter" type="text" name="title" th:value="${title}" placeholder="책 제목" class="bookshelf-input h-11 w-full bookshelf-px-4 text-sm">
          </div>
          <div class="flex items-end">
            <button type="submit" class="bookshelf-btn h-11 flex-1 bookshelf-px-4 bookshelf-btn-size-sm">검색</button>
            <a href="/books" class="bookshelf-btn-ghost ml-3 h-11 flex-1 bookshelf-px-4 bookshelf-btn-size-sm inline-flex items-center justify-center">초기화</a>
          </div>
          <input type="hidden" name="search" th:value="${search}">
        </form>
      </section>
      <datalist id="book-category-options"><option th:each="t : ${types}" th:value="${t}"></option></datalist>

      <div class="bookshelf-subtitle-sm" th:if="${totalCount > 0}">
        현재 <span th:text="${from}">0</span>~<span th:text="${to}">0</span> / 전체 <span th:text="${totalCount}">0</span>권
      </div>

      <section th:if="${not #lists.isEmpty(books)}" class="bookshelf-card-list grid grid-cols-2 bookshelf-gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <a th:each="book : ${books}" th:href="@{'/books/' + ${book.id}}" class="bookshelf-card bookshelf-hover-lift group bookshelf-pad-card-sm sm:bookshelf-p-4"><div class="bookshelf-cover-hover bookshelf-card-cover-wide relative w-full overflow-hidden rounded-[18px] bg-slate-100"><div th:if="${book.cover != null and !#strings.isEmpty(book.cover)}" class="h-full w-full"><img th:src="${book.cover}" th:alt="${book.name} + ' cover'" class="h-full w-full object-cover" loading="lazy" decoding="async" fetchpriority="low"></div><div th:unless="${book.cover != null and !#strings.isEmpty(book.cover)}" class="absolute inset-0 flex items-center justify-center bookshelf-empty-cover">NO COVER</div></div><div class="bookshelf-mt-3 sm:bookshelf-mt-4 bookshelf-space-y-1-5"><h2 class="line-clamp-2 bookshelf-title-base" th:text="${book.name}"></h2><p class="bookshelf-subtitle-sm" th:text="${book.author}"></p><div class="flex items-center justify-between bookshelf-subtitle-xs"><span th:text="${'권수 · ' + (book.totalvolume ?: '-')}"/><span class="bookshelf-chip bookshelf-chip-tag" th:text="${book.type != null ? book.type : '미분류'}"></span></div></div></a>
      </section>
      <div th:if="${#lists.isEmpty(books)}" class="bookshelf-empty bookshelf-pad-xxl text-center"><h3 class="bookshelf-title-lg">표시할 책이 없습니다</h3><p class="bookshelf-mt-2 bookshelf-subtitle-sm">카테고리, 작가, 제목 조건을 바꾸거나 책을 추가해 주세요.</p></div>

      <div class="bookshelf-pagination" th:if="${totalPages > 1}">
        <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${page > 1}" th:href="@{/books(page=1, search=${search}, type=${type}, title=${title}, author=${author})}" aria-label="첫 페이지">≪</a>
        <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${page > 1}" th:href="@{/books(page=${page - 1}, search=${search}, type=${type}, title=${title}, author=${author})}" aria-label="이전 페이지">‹</a>
        <a class="bookshelf-pagination__page bookshelf-btn-ghost" th:each="p : ${#numbers.sequence(startPage, endPage)}" th:href="@{/books(page=${p}, search=${search}, type=${type}, title=${title}, author=${author})}" th:classappend="${p == page ? ' bookshelf-btn-soft' : ''}"><span th:text="${p}"></span></a>
        <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${page < totalPages}" th:href="@{/books(page=${page + 1}, search=${search}, type=${type}, title=${title}, author=${author})}" aria-label="다음 페이지">›</a>
        <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${page < totalPages}" th:href="@{/books(page=${totalPages}, search=${search}, type=${type}, title=${title}, author=${author})}" aria-label="마지막 페이지">≫</a>
      </div>

      <dialog id="bookCreateDialog" role="dialog" aria-modal="true" aria-labelledby="bookCreateTitle" class="bookshelf-book-create-dialog backdrop:bg-slate-900/40 w-full max-w-2xl rounded-[28px] border border-slate-200 bookshelf-p-0 shadow-2xl">
        <form id="bookCreateForm" method="post" action="/books" class="bookshelf-book-create-form bookshelf-card overflow-hidden border-0 shadow-none" data-top-progress-ignore>
          <div class="flex items-center justify-between border-b border-slate-200 bookshelf-px-5 bookshelf-py-4 sm:bookshelf-px-6">
            <div><h3 id="bookCreateTitle" class="bookshelf-title-lg">책 수동 추가</h3></div>
            <button type="button" id="bookCreateClose" class="bookshelf-btn-ghost bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">닫기</button>
          </div>
          <div class="bookshelf-book-create-body bookshelf-p-4 bookshelf-px-5 bookshelf-py-5 sm:bookshelf-px-6">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input id="bookCreateSelectionConfirmed" type="hidden" name="selectionConfirmed" value="false">
            <input id="bookCreateTargetBookId" type="hidden" name="targetBookId">
            <div class="grid bookshelf-gap-3 sm:grid-cols-2">
              <div class="relative sm:col-span-2">
                <label for="bookCreateTargetSearch" class="bookshelf-mb-1 block bookshelf-detail-label">기존 책 <span class="bookshelf-subtitle-xs">(선택 사항)</span></label>
                <input id="bookCreateTargetSearch" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="기존 책 검색 · 비우면 새 책으로 등록" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false">
                <div id="bookCreateTargetResults" class="bookshelf-autocomplete-results absolute left-0 right-0 top-[calc(100%+4px)] hidden rounded-[16px] border border-slate-200 bg-white/95 p-2 shadow-lg backdrop-blur" role="listbox"></div>
                <p id="bookCreateTargetMeta" class="bookshelf-mt-2 bookshelf-subtitle-xs" hidden></p>
              </div>
              <div><label for="bookCreateName" class="bookshelf-mb-1 block bookshelf-detail-label">책 제목</label><input id="bookCreateName" name="name" type="text" required class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="책 제목"></div>
              <div><label for="bookCreateType" class="bookshelf-mb-1 block bookshelf-detail-label">카테고리</label><input id="bookCreateType" name="type" list="book-category-options" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="카테고리"></div>
            </div>

            <section id="bookCreatePreview" class="bookshelf-book-create-preview" aria-live="polite" hidden>
              <div class="bookshelf-book-create-preview-header">
                <div>
                  <h4 class="bookshelf-title-base">추가 예정 책</h4>
                  <p id="bookCreatePreviewCount" class="bookshelf-mt-1 bookshelf-subtitle-xs"></p>
                </div>
                <div class="bookshelf-book-create-preview-actions">
                  <button id="bookCreateSelectAll" type="button" class="bookshelf-btn-ghost bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-xs">전체 선택</button>
                  <button id="bookCreateExcludeAll" type="button" class="bookshelf-btn-ghost bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-xs">전체 제외</button>
                </div>
              </div>
              <p id="bookCreatePreviewMessage" class="bookshelf-subtitle-sm" hidden></p>
              <div id="bookCreatePreviewCards" class="bookshelf-book-create-preview-grid"></div>
            </section>
          </div>
          <div class="flex flex-col gap-2 bookshelf-p-2 border-t border-slate-200 bookshelf-px-5 bookshelf-py-4 sm:flex-row sm:justify-end sm:bookshelf-px-6">
            <button type="button" id="bookCreateCancel" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">취소</button>
            <button id="bookCreateSubmit" type="submit" class="bookshelf-btn bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">추가 예정 확인</button>
          </div>
        </form>
      </dialog>

      <div th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
  </div>
</div>
<script src="/js/book-list.js?v=1.3.0" defer></script>
<script src="/js/cover-preview.js" defer></script>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
