<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('지점 재고 분석 · Bookshelf')}"></head>
<body class="blko-body text-slate-800">
<div class="blko-shell px-4 py-8 sm:px-8">
    <div class="blko-app-frame">
        <aside th:replace="~{fragments/layout :: appSidebar('branches')}"></aside>
        <main class="blko-main">
            <div th:replace="~{fragments/layout :: appTopbar('Branch Analytics', '지점 재고 대시보드', '지점별 재고 흐름을 한눈에 정리해요.')}"></div>

            <section class="grid gap-4 sm:grid-cols-3">
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">지점 수</div>
                    <div class="mt-2 text-2xl font-bold blko-title" th:text="${branchCount}">0</div>
                    <div class="mt-1 text-sm blko-subtitle">현재 집계된 지점을 보여줘요.</div>
                </div>
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">총 재고 금액</div>
                    <div class="mt-2 text-2xl font-bold blko-title" th:text="${#numbers.formatInteger(totalAmount, 0, 'COMMA') + '원'}">0원</div>
                    <div class="mt-1 text-sm blko-subtitle">가격이 입력된 재고 기준 합계예요.</div>
                </div>
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">목록 수</div>
                    <div class="mt-2 text-2xl font-bold blko-title" th:text="${#lists.size(branches)}">0</div>
                    <div class="mt-1 text-sm blko-subtitle">아래 카드와 표에 표시되는 수예요.</div>
                </div>
            </section>

            <section class="blko-card p-5 sm:p-6">
                <div class="mb-4">
                    <h2 class="text-lg font-semibold blko-title">지점별 재고 금액 비교</h2>
                    <p class="mt-1 text-sm blko-subtitle">지점명은 왼쪽에, 총 금액은 아래 축에서 읽을 수 있게 정리했어요.</p>
                </div>
                <div class="mt-4 h-[520px] rounded-[20px] border border-slate-200 p-4">
                    <canvas id="branchChart"></canvas>
                </div>
            </section>

            <section class="blko-card p-5 sm:p-6">
                <div class="mb-4">
                    <h2 class="text-lg font-semibold blko-title">지점별 재고 목록</h2>
                    <p class="mt-1 text-sm blko-subtitle">지점을 누르면 해당 지점의 재고 카드로 바로 이동해요.</p>
                </div>
                <div class="blko-table-wrap desktop-only">
                    <table class="blko-table w-full text-sm">
                        <thead class="text-left blko-subtitle">
                        <tr>
                            <th class="px-4 py-3">지점명</th>
                            <th class="px-4 py-3">재고 수</th>
                            <th class="px-4 py-3">가격 입력 수</th>
                            <th class="px-4 py-3">재고 금액 합계</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(branches)}"><td colspan="4" class="px-4 py-5 text-center blko-subtitle">표시할 지점 재고가 아직 없어요.</td></tr>
                        <tr th:each="b : ${branches}" class="border-t border-slate-200">
                            <td class="px-4 py-3"><a th:href="@{/dashboard/branches/detail(branch=${b.branch})}" th:text="${b.branchName}" class="blko-link"></a></td>
                            <td class="px-4 py-3" th:text="${b.stockCount + '건'}"></td>
                            <td class="px-4 py-3" th:text="${b.pricedCount + '건'}"></td>
                            <td class="px-4 py-3" th:text="${#numbers.formatInteger(b.totalAmount, 0, 'COMMA') + '원'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="blko-mobile-cards" th:if="${not #lists.isEmpty(branches)}">
                    <a th:each="b : ${branches}" th:href="@{/dashboard/branches/detail(branch=${b.branch})}" class="blko-panel blko-hover-lift p-4">
                        <div class="flex items-center justify-between gap-3">
                            <div>
                                <div class="text-base font-semibold blko-title" th:text="${b.branchName}"></div>
                                <div class="mt-1 text-xs blko-subtitle">눌러서 재고 상세 보기</div>
                            </div>
                            <div class="blko-chip px-3 py-1 text-xs" th:text="${b.stockCount + '건'}"></div>
                        </div>
                        <div class="mt-3 grid grid-cols-2 gap-2 text-xs">
                            <div class="blko-kpi p-3"><div class="blko-subtitle">가격 입력</div><div class="mt-1 font-semibold blko-title" th:text="${b.pricedCount + '건'}"></div></div>
                            <div class="blko-kpi p-3"><div class="blko-subtitle">재고 합계</div><div class="mt-1 font-semibold blko-title" th:text="${#numbers.formatInteger(b.totalAmount, 0, 'COMMA') + '원'}"></div></div>
                        </div>
                    </a>
                </div>
            </section>

            <div th:replace="~{fragments/layout :: appFooter()}"></div>
            <script th:inline="javascript">
                const labels = /*[[${chartLabels}]]*/ [];
                const data = /*[[${chartValues}]]*/ [];
                const canvas = document.getElementById('branchChart');
                if (canvas && window.Chart) {
                    const styles = getComputedStyle(document.documentElement);
                    const tick = styles.getPropertyValue('--bk-text-soft').trim() || '#777';
                    const grid = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'rgba(255,255,255,0.08)' : 'rgba(120,120,120,0.08)';
                    const palette = [
                        'rgba(124, 92, 255, 0.82)',
                        'rgba(56, 189, 248, 0.82)',
                        'rgba(251, 146, 60, 0.82)',
                        'rgba(52, 211, 153, 0.82)',
                        'rgba(244, 114, 182, 0.82)',
                        'rgba(250, 204, 21, 0.82)',
                        'rgba(96, 165, 250, 0.82)',
                        'rgba(163, 230, 53, 0.82)'
                    ];
                    const colors = labels.map((_, idx) => palette[idx % palette.length]);
                    const ctx = canvas.getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [{
                                label: '총 금액',
                                data,
                                backgroundColor: colors,
                                borderColor: colors,
                                borderWidth: 1,
                                borderRadius: 10,
                                barThickness: 22,
                                maxBarThickness: 26
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: (context) => `${Number(context.raw).toLocaleString()}원`
                                    }
                                }
                            },
                            layout: {
                                padding: { left: 8, right: 12, top: 8, bottom: 8 }
                            },
                            scales: {
                                x: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: tick,
                                        callback: (value) => Number(value).toLocaleString() + '원'
                                    },
                                    grid: { color: grid }
                                },
                                y: {
                                    ticks: {
                                        color: tick,
                                        autoSkip: false,
                                        crossAlign: 'far',
                                        padding: 8,
                                        font: { size: 12, weight: '600' }
                                    },
                                    grid: { display: false }
                                }
                            }
                        }
                    });
                }
            </script>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
        </main>
    </div>
</div>
</body>
</html>
