<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('홈 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-shell flex min-h-screen items-center justify-center bookshelf-px-5 bookshelf-py-10 sm:bookshelf-px-8">
  <main class="w-full max-w-[720px] bookshelf-auth-card bookshelf-p-7 text-center sm:bookshelf-p-9">
    <h1 class="bookshelf-title-hero">Bookshelf</h1>
    <p class="bookshelf-mt-3 bookshelf-subtitle-sm">읽고, 찾고, 등록하는 흐름을 하나로 묶은 개인 도서 워크스페이스예요.</p>
    <div th:if="${signedIn}" class="bookshelf-mt-6 bookshelf-alert-success bookshelf-toast-source" data-toast-kind="success">로그인됨: <span class="font-semibold" th:text="${member != null ? member.username() : '회원'}"></span></div>
    <div th:unless="${signedIn}" class="bookshelf-mt-6 bookshelf-alert-info">아직 로그인 전이에요. <a href="/user/login" class="bookshelf-link">로그인</a>하고 계속해 주세요.</div>
    <div class="bookshelf-mt-6 flex flex-col items-center justify-center bookshelf-p-2 sm:flex-row"><a href="/dashboard" class="bookshelf-btn bookshelf-px-4 bookshelf-py-3 bookshelf-btn-size-sm sm:w-auto">대시보드</a><a href="/books" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-3 bookshelf-btn-size-sm sm:w-auto">책장 보기</a><a href="/products" class="bookshelf-btn-soft bookshelf-px-4 bookshelf-py-3 bookshelf-btn-size-sm sm:w-auto">상품 검색</a></div>
    <div class="bookshelf-mt-6" th:replace="~{fragments/layout :: appFooter()}"></div>
  </main>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
