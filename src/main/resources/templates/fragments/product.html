<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<section th:fragment="ownedPanel(ownedQ,ownedSort,ownedPage,aladinPage,query,activeTab,totalOwned,ownedFrom,ownedTo,totalOwnedPages,ownedStartPage,ownedEndPage,ownedVolumes)" class="blko-card p-5 sm:p-6">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
        <div><h2 class="text-xl font-semibold blko-title">내 책장 검색</h2></div>
        <div class="flex gap-2 text-xs">
            <a th:href="@{/products(ownedSort='id', ownedQ=${ownedQ}, ownedPage=1, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}" class="px-3 py-1.5 blko-btn-ghost" th:classappend="${ownedSort=='id' ? ' blko-btn-soft' : ''}">ID순</a>
            <a th:href="@{/products(ownedSort='recent', ownedQ=${ownedQ}, ownedPage=1, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}" class="px-3 py-1.5 blko-btn-ghost" th:classappend="${ownedSort=='recent' ? ' blko-btn-soft' : ''}">최근 삽입한 책</a>
        </div>
    </div>

    <form action="/products" method="get" class="mb-4 flex flex-col gap-2 sm:flex-row">
        <input type="text" name="ownedQ" th:value="${ownedQ}" placeholder="예: 해리포터, 97911..., 특정 권 제목" class="blko-input h-11 flex-1 px-4 text-sm"/>
        <input type="hidden" name="ownedSort" th:value="${ownedSort}">
        <input type="hidden" name="aladinPage" th:value="${aladinPage}">
        <input type="hidden" name="tab" th:value="${activeTab}">
        <input type="hidden" name="q" th:value="${query}">
        <button class="blko-btn px-4 py-2 text-sm sm:w-auto">책장에서 찾기</button>
    </form>

    <div class="mb-4 text-sm blko-subtitle">현재 <span th:text="${ownedFrom}"></span>~<span th:text="${ownedTo}"></span> / 전체 <span th:text="${totalOwned}"></span>권</div>

    <div th:if="${#lists.isEmpty(ownedVolumes)}" class="blko-empty p-6 sm:p-8 text-center">
        <h3 class="text-lg font-semibold blko-title">보유 권이 비어 있어요</h3>
        <p class="mt-2 text-sm blko-subtitle">권 제목이나 ISBN13 기준으로 다시 찾아보세요.</p>
    </div>

    <div th:if="${not #lists.isEmpty(ownedVolumes)}" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
        <a th:each="volume : ${ownedVolumes}" th:href="@{'/books/' + ${volume.bookId}}" class="blko-panel blko-hover-lift flex min-h-[112px] flex-col gap-3 p-4 md:flex-row md:items-start md:gap-4">
            <div class="blko-cover-hover h-28 w-20 min-h-[112px] overflow-hidden rounded-[14px] bg-slate-100 md:h-24 md:w-16">
                <img th:if="${volume.cover != null and !#strings.isEmpty(volume.cover)}" th:src="${volume.cover}" class="h-full w-full object-cover" alt="volume cover" loading="lazy" decoding="async">
                <div th:unless="${volume.cover != null and !#strings.isEmpty(volume.cover)}" class="flex h-full w-full items-center justify-center text-[10px] text-slate-400">NO</div>
            </div>
            <div class="min-w-0 flex-1 text-sm">
                <div class="truncate text-base font-semibold blko-title" th:text="${volume.name}"></div>
                <div class="mt-1 truncate blko-subtitle" th:text="${'ISBN13 · ' + (volume.isbn13 != null ? volume.isbn13 : '-')} "></div>
                <div class="mt-2 text-xs blko-subtitle" th:text="${'권번호 · ' + volume.seq + (volume.purchased ? ' · 구매완료' : ' · 미구매')}"></div>
            </div>
        </a>
    </div>

    <div class="mt-4 flex flex-wrap items-center gap-2 text-xs" th:if="${totalOwnedPages > 1}">
        <a class="blko-btn-ghost px-3 py-1.5" th:if="${ownedPage > 1}" th:href="@{/products(ownedPage=1, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}">맨앞</a>
        <a class="blko-btn-ghost px-3 py-1.5" th:if="${ownedPage > 1}" th:href="@{/products(ownedPage=${ownedPage - 1}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}">이전 페이지</a>
        <a class="blko-btn-ghost px-3 py-1.5" th:each="p : ${#numbers.sequence(ownedStartPage, ownedEndPage)}" th:href="@{/products(ownedPage=${p}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}" th:classappend="${p == ownedPage ? ' blko-btn-soft' : ''}"><span th:text="${p}"></span></a>
        <a class="blko-btn-ghost px-3 py-1.5" th:if="${ownedPage < totalOwnedPages}" th:href="@{/products(ownedPage=${ownedPage + 1}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}">다음 페이지</a>
        <a class="blko-btn-ghost px-3 py-1.5" th:if="${ownedPage < totalOwnedPages}" th:href="@{/products(ownedPage=${totalOwnedPages}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, aladinPage=${aladinPage}, tab=${activeTab})}">맨뒤</a>
    </div>
</section>

<section th:fragment="aladinPanel(query,ownedSort,ownedQ,ownedPage,aladinPage,activeTab,totalAladinResults,aladinFrom,aladinTo,totalAladinPages,aladinStartPage,aladinEndPage,aladinResults,ownedBooks,bookTypes)" class="blko-card p-5 sm:p-6">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
        <div><h2 class="text-xl font-semibold blko-title">알라딘 검색 결과</h2></div>
        <a href="/aladin/search" class="blko-link text-sm">상세 검색 보기</a>
    </div>

    <form action="/products" method="get" class="mb-4 flex flex-col gap-2 sm:flex-row">
        <input type="text" name="q" th:value="${query}" placeholder="신권 만화책 검색" class="blko-input h-11 flex-1 px-4 text-sm"/>
        <input type="hidden" name="ownedSort" th:value="${ownedSort}">
        <input type="hidden" name="ownedQ" th:value="${ownedQ}">
        <input type="hidden" name="ownedPage" th:value="${ownedPage}">
        <input type="hidden" name="tab" th:value="${activeTab}">
        <button class="blko-btn px-4 py-2 text-sm sm:w-auto">알라딘에서 찾기</button>
    </form>

    <div class="mb-4 text-sm blko-subtitle">현재 <span th:text="${aladinFrom}"></span>~<span th:text="${aladinTo}"></span> / 전체 <span th:text="${totalAladinResults}"></span>건</div>

    <div th:if="${#lists.isEmpty(aladinResults)}" class="blko-empty p-6 sm:p-8 text-center">
        <h3 class="text-lg font-semibold blko-title">알라딘 결과가 없어요</h3>
        <p class="mt-2 text-sm blko-subtitle">검색어를 입력하면 외부 결과를 카드형으로 보여드릴게요.</p>
    </div>

    <div th:if="${not #lists.isEmpty(aladinResults)}" class="space-y-4">
        <article th:each="item : ${aladinResults}" class="blko-panel blko-hover-lift p-4">
            <div class="flex gap-4">
                <div class="blko-cover-hover h-28 w-18 min-w-[4.5rem] overflow-hidden rounded-[16px] bg-slate-100">
                    <img th:if="${item.cover != null and !#strings.isEmpty(item.cover)}" th:src="${item.cover}" class="h-full w-full object-cover" alt="cover" loading="lazy" decoding="async">
                    <div th:unless="${item.cover != null and !#strings.isEmpty(item.cover)}" class="flex h-full w-full items-center justify-center text-[10px] text-slate-400">NO</div>
                </div>
                <div class="min-w-0 flex-1 text-sm">
                    <h3 class="font-semibold blko-title" th:text="${item.title}"></h3>
                    <p class="blko-subtitle" th:text="${item.author}"></p>
                    <p class="mt-1 text-xs blko-subtitle" th:text="${'ISBN13: ' + (item.isbn13 != null ? item.isbn13 : item.isbn)}"></p>
                    <div class="mt-3 flex flex-wrap gap-2 text-xs">
                        <span class="blko-chip px-2.5 py-1" th:text="${'정가 ' + (item.priceStandard ?: '-')} "></span>
                        <span class="blko-chip px-2.5 py-1" th:text="${'판매가 ' + (item.priceSales ?: '-')} "></span>
                    </div>
                </div>
            </div>

            <details class="mt-4 rounded-[16px] border border-slate-200 bg-white/60 p-3">
                <summary class="cursor-pointer text-sm font-semibold blko-title">등록 옵션 열기</summary>
                <div class="mt-3 flex flex-wrap items-end gap-2">
                    <form action="/products/import" method="post" class="product-import-form flex w-full flex-col gap-2 sm:flex-row sm:flex-wrap">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="title" th:value="${item.title}">
                        <input type="hidden" name="author" th:value="${item.author}">
                        <input type="hidden" name="cover" th:value="${item.cover}">
                        <input type="hidden" name="isbn13" th:value="${item.isbn13}">
                        <input type="hidden" name="isbn" th:value="${item.isbn}">
                        <input type="hidden" name="price" th:value="${item.priceSales}">
                        <input type="hidden" name="description" th:value="${item.description}">
                        <input type="hidden" name="ownedQ" th:value="${ownedQ}">
                        <input type="hidden" name="ownedPage" th:value="${ownedPage}">
                        <input type="hidden" name="ownedSort" th:value="${ownedSort}">
                        <input type="hidden" name="q" th:value="${query}">
                        <input type="hidden" name="aladinPage" th:value="${aladinPage}">
                        <input type="hidden" name="tab" th:value="${activeTab}">
                        <input type="hidden" name="targetBookId" class="target-book-id">
                        <div class="relative min-w-[260px] max-w-[360px] flex-1">
                            <input type="text" class="blko-input px-3 py-2 text-xs target-book-search" placeholder="기존 책 검색, 비우면 새 책으로 등록" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false">
                            <div class="target-book-results absolute left-0 right-0 top-[calc(100%+4px)] z-10 hidden rounded-[16px] border border-slate-200 bg-white/95 p-2 shadow-lg backdrop-blur" role="listbox"></div>
                        </div>
                        <input type="number" name="volume" min="1" placeholder="권 번호" class="blko-input px-3 py-2 text-xs w-[120px]">
                        <input type="text" name="type" list="book-type-options" placeholder="타입" class="blko-input px-3 py-2 text-xs w-[140px]">
                        <input type="text" name="totalVolume" placeholder="총 권수" class="blko-input px-3 py-2 text-xs w-[120px]">
                        <button type="submit" class="blko-btn px-3 py-2 text-xs sm:w-auto">선택한 책에 담기</button>
                    </form>
                    <datalist id="book-type-options">
                        <option th:each="type : ${bookTypes}" th:value="${type}"></option>
                    </datalist>
                </div>
            </details>
        </article>
    </div>

    <div class="blko-pagination mt-4" th:if="${totalAladinPages > 1}">
        <a class="blko-pagination__nav blko-btn-ghost" th:if="${aladinPage > 1}" th:href="@{/products(aladinPage=1, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="첫 페이지">≪</a>
        <a class="blko-pagination__nav blko-btn-ghost" th:if="${aladinPage > 1}" th:href="@{/products(aladinPage=${aladinPage - 1}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="이전 페이지">‹</a>
        <a class="blko-pagination__page blko-btn-ghost" th:each="p : ${#numbers.sequence(aladinStartPage, aladinEndPage)}" th:href="@{/products(aladinPage=${p}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" th:classappend="${p == aladinPage ? ' blko-btn-soft' : ''}"><span th:text="${p}"></span></a>
        <a class="blko-pagination__nav blko-btn-ghost" th:if="${aladinPage < totalAladinPages}" th:href="@{/products(aladinPage=${aladinPage + 1}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="다음 페이지">›</a>
        <a class="blko-pagination__nav blko-btn-ghost" th:if="${aladinPage < totalAladinPages}" th:href="@{/products(aladinPage=${totalAladinPages}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="마지막 페이지">≫</a>
    </div>
</section>
</body>
</html>
