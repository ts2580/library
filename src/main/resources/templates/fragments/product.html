<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<section th:fragment="aladinPanel(query,ownedSort,ownedQ,ownedPage,aladinPage,activeTab,totalAladinResults,aladinFrom,aladinTo,totalAladinPages,aladinStartPage,aladinEndPage,aladinResults,bookTypes)" class="bookshelf-card bookshelf-pad-card sm:bookshelf-pad-card-lg">
  <div class="bookshelf-mb-4 flex flex-wrap items-center justify-between bookshelf-p-2">
    <div><h2 class="bookshelf-title-xl">알라딘 검색 결과</h2></div>
    <a th:href="@{/aladin/search(query=${query})}" class="bookshelf-link text-sm">상세 검색 보기</a>
  </div>
  <datalist id="product-book-type-options"><option th:each="type : ${bookTypes}" th:value="${type}"></option></datalist>

  <form action="/products" method="get" class="bookshelf-search-inline bookshelf-mb-4 bookshelf-p-2">
    <label for="aladinProductSearch" class="sr-only">알라딘 검색어</label>
    <input id="aladinProductSearch" type="text" name="q" th:value="${query}" placeholder="신권 만화책 검색" class="bookshelf-input bookshelf-search-inline__input bookshelf-px-4 text-sm"/>
    <input type="hidden" name="ownedSort" th:value="${ownedSort}">
    <input type="hidden" name="ownedQ" th:value="${ownedQ}">
    <input type="hidden" name="ownedPage" th:value="${ownedPage}">
    <input type="hidden" name="tab" th:value="${activeTab}">
    <button class="bookshelf-btn bookshelf-search-inline__button bookshelf-px-4 bookshelf-py-3 bookshelf-btn-size-sm whitespace-nowrap">검색</button>
  </form>

  <div class="bookshelf-mb-4 bookshelf-subtitle-sm">현재 <span th:text="${aladinFrom}"></span>~<span th:text="${aladinTo}"></span> / 전체 <span th:text="${totalAladinResults}"></span>건</div>

  <div th:if="${#lists.isEmpty(aladinResults)}" class="bookshelf-empty bookshelf-p-6 sm:bookshelf-p-8 text-center">
    <h3 class="bookshelf-title-lg">알라딘 결과가 없습니다</h3>
    <p class="bookshelf-mt-2 bookshelf-subtitle-sm">검색어를 입력하면 외부 결과를 카드형으로 표시합니다.</p>
  </div>

  <div th:if="${not #lists.isEmpty(aladinResults)}" class="bookshelf-card-list grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    <article th:each="item : ${aladinResults}" class="bookshelf-card bookshelf-hover-lift group bookshelf-pad-card-sm sm:bookshelf-p-4 flex flex-col justify-between" data-product-card>
      <div>
        <div class="bookshelf-cover-hover bookshelf-card-cover-wide relative w-full overflow-hidden rounded-[18px] bg-slate-100">
          <img th:if="${item.cover != null and !#strings.isEmpty(item.cover)}" th:src="${item.cover}" class="h-full w-full object-cover" alt="cover" loading="lazy" decoding="async">
          <div th:unless="${item.cover != null and !#strings.isEmpty(item.cover)}" class="absolute inset-0 flex items-center justify-center bookshelf-empty-cover text-xs">NO COVER</div>
        </div>
        <div class="bookshelf-mt-3 sm:bookshelf-mt-4 bookshelf-space-y-1-5">
          <h2 class="line-clamp-2 bookshelf-title-base" th:text="${item.title}"></h2>
          <p class="bookshelf-subtitle-sm line-clamp-1" th:text="${item.author}"></p>
          <div class="flex flex-wrap items-center gap-1 mt-1 text-[10px] sm:text-xs" data-product-status-chips>
            <span th:if="${item.exists}" class="bookshelf-chip bg-indigo-100 text-indigo-700 font-medium" data-product-owned-chip th:text="'등록됨'"></span>
            <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'정가 ' + (item.priceStandard ?: '-')} "></span>
            <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'판매가 ' + (item.priceSales ?: '-')} "></span>
            <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'ISBN13 ' + (item.isbn13 ?: '-')} "></span>
          </div>
        </div>
      </div>

      <div th:if="${item.exists}" class="mt-3" data-product-owned-state>
        <button type="button" class="bookshelf-btn-ghost w-full bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-xs" disabled>등록됨</button>
      </div>

      <details th:unless="${item.exists}" class="bookshelf-mt-3 rounded-[16px] border border-slate-200 bg-slate-50 p-3 sm:p-4" data-product-import-panel>
        <summary class="cursor-pointer text-sm font-semibold text-slate-700">등록하기</summary>
        <div class="bookshelf-mt-2">
          <form action="/products/import" method="post" class="product-import-form flex w-full flex-col gap-3" data-top-progress-ignore>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="title" th:value="${item.title}">
            <input type="hidden" name="author" th:value="${item.author}">
            <input type="hidden" name="cover" th:value="${item.cover}">
            <input type="hidden" name="isbn13" th:value="${item.isbn13}">
            <input type="hidden" name="isbn" th:value="${item.isbn}">
            <input type="hidden" name="price" th:value="${item.priceSales}">
            <input type="hidden" name="description" th:value="${item.description}">
            <input type="hidden" name="ownedQ" th:value="${ownedQ}">
            <input type="hidden" name="ownedPage" th:value="${ownedPage}">
            <input type="hidden" name="ownedSort" th:value="${ownedSort}">
            <input type="hidden" name="q" th:value="${query}">
            <input type="hidden" name="aladinPage" th:value="${aladinPage}">
            <input type="hidden" name="tab" th:value="${activeTab}">
            <input type="hidden" name="targetBookId" class="target-book-id">
            <label class="relative flex w-full min-w-0 flex-col">
              <span class="bookshelf-mb-1 bookshelf-form-label text-[11px]">기존 책</span>
              <input type="text" class="bookshelf-input bookshelf-px-3 bookshelf-py-2 text-xs target-book-search" placeholder="검색 (비우면 새 책 등록)" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false">
              <div class="target-book-results bookshelf-autocomplete-results absolute left-0 right-0 top-[calc(100%+4px)] hidden rounded-[16px] border border-slate-200 bg-white/95 p-2 shadow-lg backdrop-blur" role="listbox"></div>
            </label>
            <div class="flex flex-col gap-2 sm:flex-row">
              <label class="flex w-full flex-col sm:w-1/2">
                <span class="bookshelf-mb-1 bookshelf-form-label text-[11px]">권 번호</span>
                <input type="number" name="volume" min="1" placeholder="번호" class="bookshelf-input bookshelf-px-3 bookshelf-py-2 text-xs" data-product-volume>
              </label>
              <label class="flex w-full flex-col sm:w-1/2">
                <span class="bookshelf-mb-1 bookshelf-form-label text-[11px]">카테고리</span>
                <input type="text" name="type" list="product-book-type-options" placeholder="선택" class="bookshelf-input bookshelf-px-3 bookshelf-py-2 text-xs" aria-label="카테고리">
              </label>
            </div>
            <label class="bookshelf-dialog-check bookshelf-form-label text-xs">
              <input type="checkbox" name="sideStory" value="true" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500" data-product-side-story>
              외전
            </label>
            <button type="submit" class="bookshelf-btn w-full bookshelf-px-4 bookshelf-py-2 text-xs font-semibold">저장</button>
          </form>
        </div>
      </details>
    </article>
  </div>

  <div class="bookshelf-pagination  bookshelf-mt-4 " th:if="${totalAladinPages > 1}">
    <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${aladinPage > 1}" th:href="@{/products(aladinPage=1, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="첫 페이지">≪</a>
    <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${aladinPage > 1}" th:href="@{/products(aladinPage=${aladinPage - 1}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="이전 페이지">‹</a>
    <a class="bookshelf-pagination__page" th:each="p : ${#numbers.sequence(aladinStartPage, aladinEndPage)}" th:href="@{/products(aladinPage=${p}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" th:classappend="${p == aladinPage ? ' is-current-page bookshelf-btn-soft' : ' bookshelf-btn-ghost'}" th:attr="aria-current=${p == aladinPage ? 'page' : null}"><span th:text="${p}"></span></a>
    <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${aladinPage < totalAladinPages}" th:href="@{/products(aladinPage=${aladinPage + 1}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="다음 페이지">›</a>
    <a class="bookshelf-pagination__nav bookshelf-btn-ghost" th:if="${aladinPage < totalAladinPages}" th:href="@{/products(aladinPage=${totalAladinPages}, ownedSort=${ownedSort}, ownedQ=${ownedQ}, q=${query}, ownedPage=${ownedPage}, tab=${activeTab})}" aria-label="마지막 페이지">≫</a>
  </div>
</section>
</body>
</html>
