<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<aside th:fragment="appSidebar(activeKey)" class="blko-sidebar blko-panel" id="blko-sidebar">
  <div class="blko-sidebar__brand">
    <div class="blko-sidebar__logo">B</div>
    <div>
      <p class="blko-title-sm">Bookshelf</p>
    </div>
  </div>

  <nav class="blko-sidebar__nav">
    <a href="/dashboard" class="blko-sidebar__link" th:classappend="${activeKey == 'dashboard'} ? ' is-active' : ''">
      <div class="blko-sidebar__link-main">
        <span class="blko-sidebar__icon" th:replace="~{fragments/layout :: iconDashboard()}"></span>
        <div><span>대시보드</span></div>
      </div>
    </a>
    <a href="/books" class="blko-sidebar__link" th:classappend="${activeKey == 'books' or activeKey == 'book-detail'} ? ' is-active' : ''">
      <div class="blko-sidebar__link-main">
        <span class="blko-sidebar__icon" th:replace="~{fragments/layout :: iconBooks()}"></span>
        <div><span>책장</span></div>
      </div>
    </a>
    <a href="/products" class="blko-sidebar__link" th:classappend="${activeKey == 'products'} ? ' is-active' : ''">
      <div class="blko-sidebar__link-main">
        <span class="blko-sidebar__icon" th:replace="~{fragments/layout :: iconProducts()}"></span>
        <div><span>상품 검색</span></div>
      </div>
    </a>
    <a href="/dashboard/branches" class="blko-sidebar__link" th:classappend="${activeKey == 'branches' or activeKey == 'branch-detail'} ? ' is-active' : ''">
      <div class="blko-sidebar__link-main">
        <span class="blko-sidebar__icon" th:replace="~{fragments/layout :: iconBranches()}"></span>
        <div><span>지점 재고</span></div>
      </div>
    </a>
  </nav>

  <div class="blko-sidebar__footer">
    <form action="/user/logout" method="post" class="w-full">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="blko-btn-ghost w-full blko-px-4 blko-py-3 blko-btn-size-sm">로그아웃</button>
    </form>
  </div>

  <div class="blko-mobile-nav">
    <a href="/dashboard" class="blko-mobile-nav__item" th:classappend="${activeKey == 'dashboard'} ? ' is-active' : ''">
      <span th:replace="~{fragments/layout :: iconDashboard()}"></span><small>대시보드</small>
    </a>
    <a href="/books" class="blko-mobile-nav__item" th:classappend="${activeKey == 'books' or activeKey == 'book-detail'} ? ' is-active' : ''">
      <span th:replace="~{fragments/layout :: iconBooks()}"></span><small>책장</small>
    </a>
    <a href="/products" class="blko-mobile-nav__item" th:classappend="${activeKey == 'products'} ? ' is-active' : ''">
      <span th:replace="~{fragments/layout :: iconProducts()}"></span><small>검색</small>
    </a>
    <a href="/dashboard/branches" class="blko-mobile-nav__item" th:classappend="${activeKey == 'branches' or activeKey == 'branch-detail'} ? ' is-active' : ''">
      <span th:replace="~{fragments/layout :: iconBranches()}"></span><small>재고</small>
    </a>
    <button type="button" class="blko-mobile-nav__item blko-mobile-nav__menu" aria-label="메뉴 열기" data-blko-sidebar-open>
      <span th:replace="~{fragments/layout :: iconMenu()}"></span><small>메뉴</small>
    </button>
  </div>
</aside>

<header th:fragment="appTopbar(badge, title, subtitle)" class="blko-topbar blko-panel blko-pad-card-lg sm:blko-p-6">
  <div class="flex flex-col blko-p-4 lg:flex-row lg:items-end lg:justify-between">
    <div class="flex items-start blko-p-3">
      <button type="button" class="blko-mobile-menu-btn" aria-label="사이드 메뉴 열기" data-blko-sidebar-open>
        <span th:replace="~{fragments/layout :: iconMenu()}"></span>
      </button>
      <div>
        <div class="inline-flex blko-badge" th:if="${badge != null && !#strings.isEmpty(badge)}" th:text="${badge}">Section</div>
        <h1 class="blko-mt-3 blko-title-page" th:text="${title}">Title</h1>
        <p class="blko-mt-1 blko-subtitle-sm" th:if="${subtitle != null && !#strings.isEmpty(subtitle)}" th:text="${subtitle}">Subtitle</p>
      </div>
    </div>
  </div>
</header>

<div th:fragment="flashMessages(success, error)" class="blko-space-y-3">
  <div th:if="${success}" class="blko-alert-success blko-toast-source" data-toast-kind="success" th:text="${success}"></div>
  <div th:if="${error}" class="blko-alert-error blko-toast-source" data-toast-kind="error" th:text="${error}"></div>
</div>

<div th:fragment="emptyState(title, subtitle)" class="blko-empty blko-p-6 sm:blko-p-8 text-center">
  <h3 class="blko-title-lg" th:text="${title}">비어 있어요</h3>
  <p class="blko-mt-2 blko-subtitle-sm" th:text="${subtitle}">아직 데이터가 없어요.</p>
</div>

<footer th:fragment="appFooter()" class="pb-2 pt-1 text-center blko-subtitle-xs">
  <p>Bookshelf ✨</p>
</footer>

<span th:fragment="iconDashboard()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="8" rx="2"></rect><rect x="14" y="3" width="7" height="5" rx="2"></rect><rect x="14" y="12" width="7" height="9" rx="2"></rect><rect x="3" y="15" width="7" height="6" rx="2"></rect></svg></span>
<span th:fragment="iconBooks()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v17.5A1.5 1.5 0 0 1 18.5 22H6.5A2.5 2.5 0 0 1 4 19.5z"></path><path d="M8 7h8"></path><path d="M8 11h8"></path><path d="M8 15h5"></path></svg></span>
<span th:fragment="iconProducts()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M7 12h10"></path><path d="M10 18h4"></path><path d="M5 3h14l2 18H3L5 3z"></path></svg></span>
<span th:fragment="iconBranches()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V8l8-4 8 4v12"></path><path d="M9 20v-5h6v5"></path><path d="M9 10h.01"></path><path d="M15 10h.01"></path></svg></span>
<span th:fragment="iconMenu()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg></span>

<script th:fragment="toastScript()">
  (() => {
    const sources = document.querySelectorAll('.blko-toast-source');
    if (sources.length) {
      let host = document.getElementById('blko-toast-host');
      if (!host) {
        host = document.createElement('div');
        host.id = 'blko-toast-host';
        host.className = 'blko-toast-host';
        document.body.appendChild(host);
      }

      sources.forEach((source) => {
        const text = (source.textContent || '').trim();
        if (!text) return;
        const toast = document.createElement('div');
        toast.className = 'blko-toast ' + (source.dataset.toastKind === 'error' ? 'blko-toast-error' : 'blko-toast-success');
        toast.textContent = text;
        host.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 240);
        }, 2600);
      });
    }

    const body = document.body;
    const sidebar = document.getElementById('blko-sidebar');
    const openButtons = document.querySelectorAll('[data-blko-sidebar-open]');
    const closeSidebar = () => body.classList.remove('blko-sidebar-open');
    const openSidebar = () => body.classList.add('blko-sidebar-open');

    openButtons.forEach((button) => button.addEventListener('click', openSidebar));
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeSidebar();
    });
    document.addEventListener('click', (event) => {
      if (!body.classList.contains('blko-sidebar-open')) return;
      if (!sidebar) return;
      const target = event.target;
      if (target.closest('[data-blko-sidebar-open]')) return;
      if (!target.closest('#blko-sidebar')) closeSidebar();
    });

    document.querySelectorAll('a[href^="/"]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('/user/logout')) return;
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
        body.classList.remove('blko-sidebar-open');
        body.classList.add('blko-page-leaving');
        if (document.startViewTransition) {
          event.preventDefault();
          document.startViewTransition(() => { window.location.href = href; });
        }
      });
    });

    window.addEventListener('pageshow', () => body.classList.remove('blko-page-leaving'));
  })();
</script>
</body>
</html>
