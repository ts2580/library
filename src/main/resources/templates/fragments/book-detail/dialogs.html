<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<th:block th:fragment="bookEditDialog(book, bookTypes)">
  <dialog id="bookEditDialog" role="dialog" aria-modal="true" aria-labelledby="bookEditTitle" class="backdrop:bg-slate-900/40 w-full max-w-2xl rounded-[28px] border border-slate-200 bookshelf-p-0 shadow-2xl">
    <form id="bookEditForm" method="post" th:action="@{/books/{id}(id=${book.id})}" class="bookshelf-card overflow-hidden border-0 shadow-none">
      <div class="bookshelf-dialog-header bookshelf-dialog-header-book">
        <div class="bookshelf-dialog-title-wrap"><h3 id="bookEditTitle" class="bookshelf-title-lg bookshelf-dialog-title-text" style="display:block; width:100%; max-width:100%; white-space:normal; word-break:keep-all; overflow-wrap:normal; writing-mode:horizontal-tb; text-orientation:mixed; transform:none; text-wrap:pretty; margin:0 !important;">책 정보 수정</h3></div>
        <button type="button" id="bookEditClose" class="bookshelf-dialog-close-icon" aria-label="닫기" title="닫기">×</button>
      </div>
      <div class="bookshelf-dialog-fields bookshelf-px-5 bookshelf-py-5 sm:bookshelf-px-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div><label for="bookEditName" class="bookshelf-mb-1 block bookshelf-detail-label">책 제목</label><input id="bookEditName" name="name" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="책 제목"></div>
        <div><label for="bookEditAuthor" class="bookshelf-mb-1 block bookshelf-detail-label">저자</label><input id="bookEditAuthor" name="author" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="저자"></div>
        <div class="bookshelf-dialog-row">
          <div><label for="bookEditTotalVolume" class="bookshelf-mb-1 block bookshelf-detail-label">총 권수</label><input id="bookEditTotalVolume" name="totalvolume" type="text" readonly class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="총 권수"></div>
          <div><label for="bookEditType" class="bookshelf-mb-1 block bookshelf-detail-label">카테고리</label><input id="bookEditType" name="type" list="book-type-options" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="카테고리"></div>
        </div>
        <div><label for="bookEditCover" class="bookshelf-mb-1 block bookshelf-detail-label">표지 URL</label><input id="bookEditCover" name="cover" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="표지 URL"></div>
        <div><label for="bookEditDescription" class="bookshelf-mb-1 block bookshelf-detail-label">설명</label><textarea id="bookEditDescription" name="description" class="bookshelf-textarea bookshelf-px-4 bookshelf-py-3" rows="4" placeholder="설명"></textarea></div>
      </div>
      <div class="bookshelf-dialog-actions">
        <button type="button" id="bookEditCancel" class="bookshelf-btn-ghost bookshelf-py-2 bookshelf-btn-size-sm bookshelf-dialog-action-btn">취소</button>
        <button type="submit" class="bookshelf-btn bookshelf-py-2 bookshelf-btn-size-sm bookshelf-dialog-action-btn">저장</button>
      </div>
    </form>
  </dialog>
  <datalist id="book-type-options"><option th:each="type : ${bookTypes}" th:value="${type}"></option></datalist>
</th:block>

<th:block th:fragment="volumeEditDialog()">
  <dialog id="volumeEditDialog" role="dialog" aria-modal="true" aria-labelledby="volumeEditTitle" class="backdrop:bg-slate-900/40 w-full max-w-2xl rounded-[28px] border border-slate-200 bookshelf-p-0 shadow-2xl">
    <form id="volumeEditForm" method="post" class="bookshelf-card overflow-hidden border-0 shadow-none">
      <div class="bookshelf-dialog-header bookshelf-dialog-header-book">
        <div class="bookshelf-dialog-title-wrap">
          <h3 id="volumeEditTitle" class="bookshelf-title-lg bookshelf-dialog-title-text" style="display:block; width:100%; max-width:100%; white-space:normal; word-break:keep-all; overflow-wrap:normal; writing-mode:horizontal-tb; text-orientation:mixed; transform:none; text-wrap:pretty; margin:0 !important;">권 세부 내역 수정</h3>
          <p id="volumeEditSubtitle" hidden class="bookshelf-mt-1 bookshelf-subtitle-sm bookshelf-dialog-subtitle" style="display:block; width:100%; max-width:100%; white-space:normal; word-break:keep-all; overflow-wrap:normal; writing-mode:horizontal-tb; text-orientation:mixed; transform:none; text-wrap:pretty; margin:0 !important;"></p>
        </div>
        <button type="button" id="volumeEditClose" class="bookshelf-dialog-close-icon" aria-label="닫기" title="닫기">×</button>
      </div>
      <div class="bookshelf-volume-edit-body">
        <div class="bookshelf-volume-edit-cover"><div class="overflow-hidden rounded-[18px] border border-slate-200 bg-slate-100"><img id="volumeEditPreview" src="" alt="preview" class="aspect-[2/3] h-auto w-full object-cover"></div></div>
        <div class="bookshelf-dialog-fields">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="bookshelf-dialog-row">
            <div><label for="volumeEditSeq" class="bookshelf-mb-1 block bookshelf-detail-label">권 번호</label><input id="volumeEditSeq" name="seq" type="number" min="1" required class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
            <div><label for="volumeEditType" class="bookshelf-mb-1 block bookshelf-detail-label">카테고리</label><input id="volumeEditType" name="type" list="book-type-options" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          </div>
          <div><label for="volumeEditName" class="bookshelf-mb-1 block bookshelf-detail-label">권 제목</label><input id="volumeEditName" name="name" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          <div class="bookshelf-dialog-row">
            <div><label for="volumeEditIsbn13" class="bookshelf-mb-1 block bookshelf-detail-label">ISBN13</label><input id="volumeEditIsbn13" name="isbn13" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
            <div><label for="volumeEditPrice" class="bookshelf-mb-1 block bookshelf-detail-label">가격</label><input id="volumeEditPrice" name="price" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          </div>
          <div><label for="volumeEditCover" class="bookshelf-mb-1 block bookshelf-detail-label">표지 URL</label><input id="volumeEditCover" name="cover" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          <div><label for="volumeEditDescription" class="bookshelf-mb-1 block bookshelf-detail-label">설명</label><textarea id="volumeEditDescription" name="description" class="bookshelf-textarea bookshelf-px-4 bookshelf-py-3" rows="3" placeholder="설명"></textarea></div>
          <div class="bookshelf-dialog-checks">
            <label class="bookshelf-dialog-check bookshelf-detail-label"><input id="volumeEditSideStory" name="sideStory" type="checkbox" value="true" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500">외전</label>
            <label class="bookshelf-dialog-check bookshelf-detail-label"><input id="volumeEditPurchased" name="purchased" type="checkbox" value="true" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500">구매 완료로 표시</label>
            <label class="bookshelf-dialog-check bookshelf-detail-label"><input id="volumeEditNoNeedToBuy" name="noNeedToBuy" type="checkbox" value="true" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500">살 필요 없음</label>
          </div>
        </div>
      </div>
      <div class="bookshelf-dialog-actions">
        <button type="button" id="volumeEditCancel" class="bookshelf-btn-ghost bookshelf-py-2 bookshelf-btn-size-sm bookshelf-dialog-action-btn">취소</button>
        <button type="submit" class="bookshelf-btn bookshelf-py-2 bookshelf-btn-size-sm bookshelf-dialog-action-btn">저장</button>
      </div>
    </form>
  </dialog>
</th:block>
</body>
</html>
