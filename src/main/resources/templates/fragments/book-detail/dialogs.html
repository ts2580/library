<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<th:block th:fragment="bookEditDialog(book, bookTypes)">
  <dialog id="bookEditDialog" class="backdrop:bg-slate-900/40 w-full max-w-2xl rounded-[28px] border border-slate-200 bookshelf-p-0 shadow-2xl">
    <form id="bookEditForm" method="post" th:action="@{'/books/' + ${book.id}}" class="bookshelf-card overflow-hidden border-0 shadow-none">
      <div class="flex items-center justify-between border-b border-slate-200 bookshelf-px-5 bookshelf-py-4 sm:bookshelf-px-6">
        <div><h3 class="bookshelf-title-lg">책 정보 수정</h3></div>
        <button type="button" id="bookEditClose" class="bookshelf-btn-ghost bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">닫기</button>
      </div>
      <div class="grid bookshelf-p-4 bookshelf-px-5 bookshelf-py-5 sm:bookshelf-px-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input id="bookEditName" name="name" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="책 제목">
        <input id="bookEditAuthor" name="author" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="저자">
        <div class="grid bookshelf-p-4 sm:grid-cols-2">
          <input id="bookEditTotalVolume" name="totalvolume" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="총 권수">
          <input id="bookEditType" name="type" list="book-type-options" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="타입">
        </div>
        <input id="bookEditCover" name="cover" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3" placeholder="표지 URL">
        <textarea id="bookEditDescription" name="description" class="bookshelf-textarea bookshelf-px-4 bookshelf-py-3" rows="4" placeholder="설명"></textarea>
      </div>
      <div class="flex flex-col bookshelf-p-2 border-t border-slate-200 bookshelf-px-5 bookshelf-py-4 sm:flex-row sm:justify-end sm:bookshelf-px-6">
        <button type="button" id="bookEditCancel" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">취소</button>
        <button type="submit" class="bookshelf-btn bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">저장</button>
      </div>
    </form>
  </dialog>
  <datalist id="book-type-options"><option th:each="type : ${bookTypes}" th:value="${type}"></option></datalist>
</th:block>

<th:block th:fragment="volumeEditDialog()">
  <dialog id="volumeEditDialog" class="backdrop:bg-slate-900/40 w-full max-w-2xl rounded-[28px] border border-slate-200 bookshelf-p-0 shadow-2xl">
    <form id="volumeEditForm" method="post" class="bookshelf-card overflow-hidden border-0 shadow-none">
      <div class="flex items-center justify-between border-b border-slate-200 bookshelf-px-5 bookshelf-py-4 sm:bookshelf-px-6">
        <div>
          <h3 class="bookshelf-title-lg">권 세부 내역 수정</h3>
          <p id="volumeEditSubtitle" class="bookshelf-mt-1 bookshelf-subtitle-sm">선택한 권 정보를 수정해요.</p>
        </div>
        <button type="button" id="volumeEditClose" class="bookshelf-btn-ghost bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">닫기</button>
      </div>
      <div class="grid bookshelf-p-4 bookshelf-px-5 bookshelf-py-5 sm:bookshelf-px-6 sm:grid-cols-[180px_1fr]">
        <div><div class="overflow-hidden rounded-[18px] border border-slate-200 bg-slate-100"><img id="volumeEditPreview" src="" alt="preview" class="aspect-[2/3] h-auto w-full object-cover"></div></div>
        <div class="grid bookshelf-p-4">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="grid bookshelf-p-4 sm:grid-cols-2">
            <div><label class="bookshelf-mb-1 block bookshelf-detail-label">권 번호</label><input id="volumeEditSeq" name="seq" type="number" min="1" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
            <div><label class="bookshelf-mb-1 block bookshelf-detail-label">타입</label><input id="volumeEditType" name="type" list="book-type-options" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          </div>
          <div><label class="bookshelf-mb-1 block bookshelf-detail-label">권 제목</label><input id="volumeEditName" name="name" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          <div class="grid bookshelf-p-4 sm:grid-cols-2">
            <div><label class="bookshelf-mb-1 block bookshelf-detail-label">ISBN13</label><input id="volumeEditIsbn13" name="isbn13" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
            <div><label class="bookshelf-mb-1 block bookshelf-detail-label">가격</label><input id="volumeEditPrice" name="price" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          </div>
          <div><label class="bookshelf-mb-1 block bookshelf-detail-label">표지 URL</label><input id="volumeEditCover" name="cover" type="text" class="bookshelf-input bookshelf-px-4 bookshelf-py-3"></div>
          <label class="inline-flex items-center bookshelf-p-2 bookshelf-detail-label"><input id="volumeEditPurchased" name="purchased" type="checkbox" value="true" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500">구매 완료로 표시</label>
        </div>
      </div>
      <div class="flex flex-col bookshelf-p-2 border-t border-slate-200 bookshelf-px-5 bookshelf-py-4 sm:flex-row sm:justify-end sm:bookshelf-px-6">
        <button type="button" id="volumeEditCancel" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">취소</button>
        <button type="submit" class="bookshelf-btn bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">저장</button>
      </div>
    </form>
  </dialog>
</th:block>
</body>
</html>
