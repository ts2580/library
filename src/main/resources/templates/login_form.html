<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('로그인 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-auth-wrap bookshelf-px-5 bookshelf-py-10 sm:bookshelf-px-8">
  <main class="w-full max-w-[460px] bookshelf-auth-card bookshelf-px-6 bookshelf-py-7 sm:bookshelf-px-8 sm:bookshelf-py-9">
    <div class="bookshelf-mb-8 text-center">
      <a href="/" class="inline-flex items-center justify-center tracking-tight bookshelf-title-hero">Bookshelf</a>
    </div>

    <div th:replace="~{fragments/layout :: flashMessages(${signupSuccess ?: logoutMessage}, ${loginError})}"></div>
    <div th:if="${signupError}" class="bookshelf-mb-5 bookshelf-alert-error" th:text="${signupError}"></div>

    <div th:if="${!dbEnabled}" class="bookshelf-mb-5 bookshelf-alert-info">DB 비활성 모드에서는 로그인할 수 없습니다.</div>

    <form method="post" th:action="@{/user/login}" th:object="${loginForm}" class="bookshelf-space-y-4" th:if="${dbEnabled}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <h1 class="bookshelf-title-2xl">로그인</h1>

      <div class="bookshelf-mt-5 bookshelf-space-y-4">
        <div>
          <label for="username" class="bookshelf-mb-2 block bookshelf-form-label">아이디</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="아이디" class="bookshelf-input h-14 bookshelf-px-4 text-base placeholder:text-slate-400">
        </div>
        <div>
          <label for="password" class="bookshelf-mb-2 block bookshelf-form-label">비밀번호</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="비밀번호" class="bookshelf-input h-14 bookshelf-px-4 text-base placeholder:text-slate-400">
        </div>
      </div>

      <button type="submit" class="bookshelf-btn h-14 w-full bookshelf-px-4 bookshelf-btn-size-lg">로그인</button>
      <a th:if="${registrationEnabled}" href="/user/signup" class="bookshelf-btn-ghost h-12 w-full bookshelf-px-4 bookshelf-btn-size-sm">새 계정 만들기</a>
    </form>

    <div th:if="${!dbEnabled}" class="bookshelf-space-y-4">
      <h1 class="bookshelf-title-2xl">로그인</h1>
      <p class="bookshelf-subtitle-sm">현재는 화면만 확인 가능한 상태예요.</p>
      <input disabled placeholder="아이디 (비활성)" class="bookshelf-input h-14 bookshelf-px-4 text-base text-slate-400">
      <input disabled type="password" placeholder="비밀번호 (비활성)" class="bookshelf-input h-14 bookshelf-px-4 text-base text-slate-400">
      <button type="button" disabled class="bookshelf-btn-ghost h-14 w-full bookshelf-px-4 bookshelf-btn-size-lg opacity-60">로그인 비활성</button>
    </div>

    <div class="bookshelf-mt-6" th:replace="~{fragments/layout :: appFooter()}"></div>
  </main>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
