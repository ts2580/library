<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('로그인 · Bookshelf')}"></head>
<body class="blko-body text-slate-800">
<div class="blko-auth-wrap px-5 py-10 sm:px-8">
    <main class="w-full max-w-[460px] blko-auth-card px-6 py-7 sm:px-8 sm:py-9">
        <div class="mb-8 text-center"><a href="/" class="inline-flex items-center justify-center text-4xl font-extrabold tracking-tight blko-title sm:text-5xl">Bookshelf</a><p class="mt-3 text-sm blko-subtitle">도서 워크스페이스에 로그인하고 바로 이어서 작업해요.</p></div>
        <div th:replace="~{fragments/layout :: flashMessages(${signupSuccess ?: logoutMessage}, ${loginError})}"></div>
        <div th:if="${!dbEnabled}" class="mb-5 blko-alert-info">DB 비활성 모드에서는 로그인할 수 없습니다.</div>
        <form method="post" th:action="@{/user/login}" th:object="${loginForm}" class="space-y-4" th:if="${dbEnabled}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><div class="blko-card p-5 sm:p-6"><h1 class="text-2xl font-bold blko-title">로그인</h1><p class="mt-2 text-sm blko-subtitle">아이디와 비밀번호를 입력하면 바로 대시보드로 이동해요.</p><div class="mt-5 space-y-4"><div><label for="username" class="mb-2 block text-sm font-semibold text-slate-700">아이디</label><input type="text" id="username" name="username" autocomplete="username" placeholder="아이디" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div><div><label for="password" class="mb-2 block text-sm font-semibold text-slate-700">비밀번호</label><input type="password" id="password" name="password" autocomplete="current-password" placeholder="비밀번호" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div></div></div><button type="submit" class="blko-btn h-14 w-full px-4 text-lg">로그인</button><a th:if="${registrationEnabled}" href="/user/signup" class="blko-btn-ghost h-12 w-full px-4 text-sm">새 계정 만들기</a></form>
        <div th:if="${!dbEnabled}" class="space-y-4 blko-card p-5 sm:p-6"><h1 class="text-2xl font-bold blko-title">로그인</h1><p class="text-sm blko-subtitle">현재는 화면만 확인 가능한 상태예요.</p><input disabled placeholder="아이디 (비활성)" class="blko-input h-14 px-4 text-base text-slate-400"><input disabled type="password" placeholder="비밀번호 (비활성)" class="blko-input h-14 px-4 text-base text-slate-400"><button type="button" disabled class="blko-btn-ghost h-14 w-full px-4 text-lg opacity-60">로그인 비활성</button></div>
        <div class="mt-6" th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
