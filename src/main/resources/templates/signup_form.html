<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('회원가입 · Bookshelf')}"></head>
<body class="blko-body text-slate-800">
<div class="blko-auth-wrap px-5 py-10 sm:px-8">
    <main class="w-full max-w-[560px] blko-auth-card px-6 py-7 sm:px-8 sm:py-9">
        <div class="mb-8 text-center"><a href="/user/login" class="inline-flex items-center justify-center text-4xl font-extrabold tracking-tight blko-title sm:text-5xl">Bookshelf</a><p class="mt-3 text-sm blko-subtitle">새 계정을 만들고 바로 Bookshelf로 들어가요.</p></div>
        <div th:replace="~{fragments/layout :: flashMessages(${null}, ${signupError})}"></div>
        <div th:if="${!dbEnabled || !registrationEnabled}" class="mb-5 blko-alert-info">현재 회원가입이 비활성화되어 있습니다.</div>
        <form method="post" th:action="@{/user/signup}" th:object="${signupForm}" class="space-y-4" th:if="${dbEnabled && registrationEnabled}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><div class="blko-card p-5 sm:p-6"><h1 class="text-2xl font-bold blko-title">회원가입</h1><p class="mt-2 text-sm blko-subtitle">짧게 입력하고 바로 작업을 시작할 수 있게 만들었어요.</p><div class="mt-5 space-y-4"><div><label for="username" class="mb-2 block text-sm font-semibold text-slate-700">아이디</label><input type="text" id="username" th:field="*{username}" autocomplete="username" placeholder="아이디" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div><div class="grid gap-4 sm:grid-cols-2"><div><label for="password" class="mb-2 block text-sm font-semibold text-slate-700">비밀번호</label><input type="password" id="password" th:field="*{password}" autocomplete="new-password" placeholder="비밀번호" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div><div><label for="confirmPassword" class="mb-2 block text-sm font-semibold text-slate-700">비밀번호 확인</label><input type="password" id="confirmPassword" th:field="*{confirmPassword}" autocomplete="new-password" placeholder="비밀번호 확인" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div></div><div><label for="email" class="mb-2 block text-sm font-semibold text-slate-700">이메일</label><input type="email" id="email" th:field="*{email}" autocomplete="email" placeholder="선택 입력" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div><div><label for="name" class="mb-2 block text-sm font-semibold text-slate-700">이름</label><input type="text" id="name" th:field="*{name}" placeholder="선택 입력" class="blko-input h-14 px-4 text-base placeholder:text-slate-400"></div><div><label for="description" class="mb-2 block text-sm font-semibold text-slate-700">소개</label><textarea id="description" th:field="*{description}" rows="4" placeholder="선택 입력" class="blko-textarea px-4 py-3 text-base placeholder:text-slate-400"></textarea></div></div></div><button type="submit" class="blko-btn h-14 w-full px-4 text-lg">회원가입하고 시작하기</button><a href="/user/login" class="blko-btn-ghost h-12 w-full px-4 text-sm">로그인으로 돌아가기</a></form>
        <div class="mt-6" th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
