<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('회원가입 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-auth-wrap bookshelf-px-5 bookshelf-py-10 sm:bookshelf-px-8">
  <main class="w-full max-w-[560px] bookshelf-auth-card bookshelf-px-6 bookshelf-py-7 sm:bookshelf-px-8 sm:bookshelf-py-9">
    <div class="bookshelf-mb-8 text-center">
      <a href="/user/login" class="inline-flex items-center justify-center tracking-tight bookshelf-title-hero">Bookshelf</a>
    </div>

    <div th:replace="~{fragments/layout :: flashMessages(${null}, ${signupError})}"></div>
    <div th:if="${!registrationEnabled}" class="bookshelf-mb-5 bookshelf-alert-info">현재 회원가입이 비활성화되어 있습니다.</div>

    <form method="post" th:action="@{/user/signup}" th:object="${signupForm}" class="bookshelf-space-y-4" th:if="${registrationEnabled}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <h1 class="bookshelf-title-2xl">회원가입</h1>

      <div class="bookshelf-mt-5 bookshelf-space-y-4">
        <div>
          <label for="username" class="bookshelf-mb-2 block bookshelf-form-label">아이디</label>
          <input type="text" id="username" th:field="*{username}" autocomplete="username" placeholder="아이디" class="bookshelf-input h-14 bookshelf-px-4 text-base placeholder:text-slate-400">
        </div>
        <div>
          <label for="password" class="bookshelf-mb-2 block bookshelf-form-label">비밀번호</label>
          <input type="password" id="password" th:field="*{password}" autocomplete="new-password" placeholder="비밀번호" class="bookshelf-input h-14 bookshelf-px-4 text-base placeholder:text-slate-400">
        </div>
        <div>
          <label for="confirmPassword" class="bookshelf-mb-2 block bookshelf-form-label">비밀번호 확인</label>
          <input type="password" id="confirmPassword" th:field="*{confirmPassword}" autocomplete="new-password" placeholder="비밀번호 확인" class="bookshelf-input h-14 bookshelf-px-4 text-base placeholder:text-slate-400">
        </div>
        <div>
          <label for="email" class="bookshelf-mb-2 block bookshelf-form-label">이메일</label>
          <input type="email" id="email" th:field="*{email}" autocomplete="email" placeholder="선택 입력" class="bookshelf-input h-14 bookshelf-px-4 text-base placeholder:text-slate-400">
        </div>
      </div>

      <button type="submit" class="bookshelf-btn h-14 w-full bookshelf-px-4 bookshelf-btn-size-lg">회원가입하고 시작하기</button>
      <a href="/user/login" class="bookshelf-btn-ghost h-12 w-full bookshelf-px-4 bookshelf-btn-size-sm">로그인으로 돌아가기</a>
    </form>

    <div class="bookshelf-mt-6" th:replace="~{fragments/layout :: appFooter()}"></div>
  </main>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
