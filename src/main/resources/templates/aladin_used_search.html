<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('알라딘 중고 조회 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-shell bookshelf-shell-wide bookshelf-py-8">
  <div class="bookshelf-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('aladin-used')}"></aside>
    <main class="bookshelf-main">
      <div th:replace="~{fragments/layout :: appTopbar('Used Inventory', '알라딘 중고 조회', 'ISBN13 기준 중고 재고와 응답 요약을 함께 확인해요.')}"></div>

  <div class="bookshelf-card bookshelf-pad-card">
    <div class="flex flex-col bookshelf-p-2 sm:flex-row sm:flex-wrap sm:items-center">
      <a th:href="@{/aladin/used(isbn13=${isbn13},type='dropshipping')}" class="bookshelf-btn-soft bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">드롭시핑 중고</a>
      <a th:href="@{/aladin/used(isbn13=${isbn13},type='offstore')}" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">알라딘 지점 중고</a>
      <a href="/aladin/search" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">알라딘 검색으로 돌아가기</a>
    </div>
  </div>

  <div th:if="${usedView != null}" th:replace="~{fragments/layout :: flashMessages(${usedView.hasError ? null : null}, ${usedView.hasError ? usedView.message : null})}"></div>

  <div class="grid bookshelf-p-4 lg:grid-cols-[1.08fr_0.92fr]" th:if="${usedView != null}">
    <section class="bookshelf-card bookshelf-pad-card sm:bookshelf-p-5">
      <div class="bookshelf-mb-4 flex items-center justify-between bookshelf-p-3">
        <div>
          <div class="inline-flex bookshelf-badge">Parsed Inventory</div>
          <h2 class="bookshelf-mt-3 bookshelf-title-lg">중고 재고 카드</h2>
        </div>
        <span class="bookshelf-chip bookshelf-chip-tag-lg" th:text="${usedView.totalCount + '건'}">0건</span>
      </div>

      <div class="grid bookshelf-p-3 sm:grid-cols-3  bookshelf-mb-4 ">
        <div class="bookshelf-kpi bookshelf-pad-card"><div class="bookshelf-kpi-label">ISBN13</div><div class="bookshelf-mt-2 bookshelf-title-base" th:text="${usedView.isbn13}"></div></div>
        <div class="bookshelf-kpi bookshelf-pad-card"><div class="bookshelf-kpi-label">Type</div><div class="bookshelf-mt-2 bookshelf-title-base" th:text="${usedView.type}"></div></div>
        <div class="bookshelf-kpi bookshelf-pad-card"><div class="bookshelf-kpi-label">Min Price</div><div class="bookshelf-mt-2 bookshelf-title-base" th:text="${usedView.minPrice != null ? #numbers.formatInteger(usedView.minPrice,0,'COMMA') + '원' : '-'}"></div></div>
      </div>

      <div class="bookshelf-space-y-4" th:if="${!#lists.isEmpty(usedView.stocks)}">
        <article th:each="stock : ${usedView.stocks}" class="bookshelf-panel bookshelf-hover-lift bookshelf-pad-card">
          <div class="flex flex-col bookshelf-p-3 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <h3 class="bookshelf-title-base" th:text="${stock.branchName != null and !#strings.isEmpty(stock.branchName) ? stock.branchName : '이름 없는 지점'}"></h3>
              <p class="bookshelf-mt-1 bookshelf-subtitle-sm" th:text="${stock.title != null and !#strings.isEmpty(stock.title) ? stock.title : '도서명 정보 없음'}"></p>
              <div class="bookshelf-mt-3 flex flex-wrap bookshelf-p-2 text-xs">
                <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'지점코드 · ' + (stock.branch != null ? stock.branch : '-')}"></span>
                <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'상태 · ' + (stock.grade != null ? stock.grade : '-')}"></span>
                <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'가격 · ' + (stock.price != null ? stock.price + '원' : '-')}"></span>
              </div>
            </div>
            <div class="flex flex-wrap bookshelf-p-2">
              <a th:if="${stock.bookLink != null and !#strings.isEmpty(stock.bookLink)}" th:href="${stock.bookLink}" target="_blank" class="bookshelf-btn-ghost bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-xs sm:w-auto">상품 페이지</a>
              <a th:if="${stock.purchaseLink != null and !#strings.isEmpty(stock.purchaseLink)}" th:href="${stock.purchaseLink}" target="_blank" class="bookshelf-btn-soft bookshelf-px-3 bookshelf-py-2 bookshelf-btn-size-xs sm:w-auto">바로 구매</a>
            </div>
          </div>
        </article>
      </div>

      <div th:if="${#lists.isEmpty(usedView.stocks)}" th:replace="~{fragments/layout :: emptyState('중고 재고가 없어요', '이 ISBN13 기준으로 조회 가능한 중고 재고를 찾지 못했어요.')}"></div>
    </section>

    <section class="bookshelf-card bookshelf-pad-card sm:bookshelf-p-5">
      <div class="bookshelf-mb-3 flex items-center justify-between"><h2 class="bookshelf-title-sm">원본 JSON</h2><span class="bookshelf-subtitle-xs" th:text="${#strings.length(usedView.rawJson) + ' chars'}">0 chars</span></div>
      <pre class="bookshelf-json max-h-[70vh] overflow-auto bookshelf-px-4 bookshelf-py-4 text-xs" th:text="${usedView.rawJson}"></pre>
    </section>
  </div>

  <div th:replace="~{fragments/layout :: appFooter()}"></div>
</main>
  </div>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
