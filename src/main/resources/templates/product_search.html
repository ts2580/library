<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('상품 검색 · Bookshelf')}"></head>
<body class="blko-body">
<div class="blko-shell blko-shell-wide blko-py-8">
  <div class="blko-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('products')}"></aside>
    <main class="blko-main">
      <div th:replace="~{fragments/layout :: appTopbar(null, '상품 검색', '내 책장과 외부 검색 결과를 비교하고 바로 등록해요.')}"></div>
      <div th:replace="~{fragments/layout :: flashMessages(${success}, ${error})}"></div>

      <section class="pt-1">
        <div class="blko-product-tabs blko-card blko-p-2" role="tablist" aria-label="상품 검색 패널 탭">
          <button type="button" class="blko-product-tab" th:classappend="${activeTab == 'owned'} ? ' is-active' : ''" data-product-tab="owned" role="tab" aria-controls="product-panel-owned" th:attr="aria-selected=${activeTab == 'owned'}">내 책장 검색</button>
          <button type="button" class="blko-product-tab" th:classappend="${activeTab == 'aladin'} ? ' is-active' : ''" data-product-tab="aladin" role="tab" aria-controls="product-panel-aladin" th:attr="aria-selected=${activeTab == 'aladin'}">알라딘 검색</button>
        </div>

        <div class="blko-mt-4 grid blko-p-4 xl:grid-cols-2 blko-product-panels">
          <div id="product-panel-owned" class="blko-product-panel" th:classappend="${activeTab == 'owned'} ? ' is-active' : ''" data-product-panel="owned" role="tabpanel">
            <div th:replace="~{fragments/product :: ownedPanel(${ownedQ}, ${ownedSort}, ${ownedPage}, ${aladinPage}, ${query}, ${activeTab}, ${totalOwned}, ${ownedFrom}, ${ownedTo}, ${totalOwnedPages}, ${ownedStartPage}, ${ownedEndPage}, ${ownedVolumes})}"></div>
          </div>
          <div id="product-panel-aladin" class="blko-product-panel" th:classappend="${activeTab == 'aladin'} ? ' is-active' : ''" data-product-panel="aladin" role="tabpanel">
            <div th:replace="~{fragments/product :: aladinPanel(${query}, ${ownedSort}, ${ownedQ}, ${ownedPage}, ${aladinPage}, ${activeTab}, ${totalAladinResults}, ${aladinFrom}, ${aladinTo}, ${totalAladinPages}, ${aladinStartPage}, ${aladinEndPage}, ${aladinResults}, ${ownedBooks}, ${bookTypes})}"></div>
          </div>
        </div>
      </section>

      <div th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
  </div>
</div>
<script th:inline="javascript">
  (() => {
    const tabs = document.querySelectorAll('[data-product-tab]');
    const panels = document.querySelectorAll('[data-product-panel]');
    const tabletMedia = window.matchMedia('(max-width: 1279px)');
    const initialTab = /*[[${activeTab}]]*/ 'owned';
    let activeTab = initialTab === 'aladin' ? 'aladin' : 'owned';
    const updateUrl = (key) => {
      const url = new URL(window.location.href);
      url.searchParams.set('tab', key);
      window.history.replaceState({}, '', url);
    };
    const activate = (key) => {
      activeTab = key === 'aladin' ? 'aladin' : 'owned';
      tabs.forEach((tab) => {
        const active = tab.dataset.productTab === activeTab;
        tab.classList.toggle('is-active', active);
        tab.setAttribute('aria-selected', active ? 'true' : 'false');
        tab.setAttribute('tabindex', active ? '0' : '-1');
      });
      panels.forEach((panel) => {
        const active = panel.dataset.productPanel === activeTab;
        panel.classList.toggle('is-active', active);
        panel.toggleAttribute('hidden', tabletMedia.matches && !active);
      });
      updateUrl(activeTab);
    };
    tabs.forEach((tab) => {
      tab.addEventListener('click', () => activate(tab.dataset.productTab));
      tab.addEventListener('keydown', (event) => {
        if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
        event.preventDefault();
        const orderedTabs = Array.from(tabs);
        const currentIndex = orderedTabs.findIndex((item) => item.dataset.productTab === activeTab);
        const delta = event.key === 'ArrowRight' ? 1 : -1;
        const nextIndex = (currentIndex + delta + orderedTabs.length) % orderedTabs.length;
        const nextTab = orderedTabs[nextIndex];
        nextTab.focus();
        activate(nextTab.dataset.productTab);
      });
    });
    const syncMode = () => {
      if (!tabletMedia.matches) {
        panels.forEach((panel) => {
          panel.classList.add('is-active');
          panel.removeAttribute('hidden');
        });
        return;
      }
      activate(activeTab);
    };
    syncMode();
    tabletMedia.addEventListener('change', syncMode);
  })();
</script>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
