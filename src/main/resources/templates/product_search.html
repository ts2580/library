<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('상품 검색 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-shell bookshelf-shell-wide bookshelf-py-8">
  <div class="bookshelf-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('products')}"></aside>
    <main class="bookshelf-main">
      <div th:replace="~{fragments/layout :: appTopbar(null, '상품 검색', null)}"></div>
      <div th:replace="~{fragments/layout :: flashMessages(${success}, ${error})}"></div>

      <section class="pt-1">
        <div class="bookshelf-mt-4 bookshelf-p-4 bookshelf-product-panels">
          <div th:replace="~{fragments/product :: aladinPanel(${query}, ${ownedSort}, ${ownedQ}, ${ownedPage}, ${aladinPage}, ${activeTab}, ${totalAladinResults}, ${aladinFrom}, ${aladinTo}, ${totalAladinPages}, ${aladinStartPage}, ${aladinEndPage}, ${aladinResults}, ${bookTypes})}"></div>
        </div>
      </section>

      <div th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
  </div>
</div>
<script src="/js/product-search.js?v=1.7.2" defer></script>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
