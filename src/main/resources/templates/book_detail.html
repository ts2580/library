<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead(${book.name + ' · Bookshelf'})}"></head>
<body class="blko-body">
<div id="bookDetailPage" th:attr="data-book-id=${book.id},data-book-name=${book.name}" class="blko-shell blko-shell-wide blko-py-8">
  <div class="blko-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('book-detail')}"></aside>
    <main class="blko-main">
      <div th:replace="~{fragments/layout :: appTopbar('Book Detail', '도서 상세', '책 정보와 권별 목록을 한 화면에서 정리해요.')}"></div>
      <div th:replace="~{fragments/layout :: flashMessages(${success}, ${error})}"></div>

      <div class="grid blko-p-5 sm:blko-p-6 lg:grid-cols-[340px_1fr]">
        <aside class="blko-card blko-pad-card sm:blko-p-6 cursor-pointer" id="bookInfoCard"
            th:attr="data-book-name=${book.name},data-book-author=${book.author},data-book-description=${book.description},data-book-cover=${book.cover},data-book-type=${book.type},data-book-totalvolume=${book.totalvolume}">
          <div class="rounded-[22px] border border-slate-200 bg-slate-50 blko-pad-card">
            <div class="blko-cover-hover relative mx-auto aspect-[2/3] max-w-[220px] overflow-hidden rounded-[18px] bg-slate-100">
              <div th:if="${book.cover != null and !#strings.isEmpty(book.cover)}" class="h-full w-full">
                <img th:src="${book.cover}" th:alt="${book.name}" class="h-full w-full object-cover" loading="lazy" decoding="async" fetchpriority="low">
              </div>
              <div th:unless="${book.cover != null and !#strings.isEmpty(book.cover)}" class="absolute inset-0 flex items-center justify-center blko-empty-cover">NO COVER</div>
            </div>
          </div>
          <h1 class="blko-mt-4 sm:blko-mt-5 blko-title-responsive-xl" th:text="${book.name}"></h1>
          <div class="blko-mt-3 sm:blko-mt-4 blko-space-y-2 blko-subtitle-sm">
            <p><span class="blko-detail-label">저자</span> · <span th:text="${book.author}"></span></p>
            <p><span class="blko-detail-label">총권수</span> · <span th:text="${book.totalvolume}"></span></p>
            <p><span class="blko-detail-label">타입</span> · <span th:text="${book.type}"></span></p>
            <p><span class="blko-detail-label">동기화</span> · <span th:text="${book.sync}"></span></p>
          </div>
          <p class="blko-mt-4 rounded-[18px] border border-slate-200 blko-p-4 blko-subtitle-sm" th:text="${book.description ?: '설명이 없습니다.'}"></p>
          <div class="blko-mt-3 blko-subtitle-xs">카드를 누르면 책 정보를 수정할 수 있어요.</div>
          <div class="blko-mt-4 flex flex-col blko-p-2 sm:flex-row">
            <a href="/books" class="blko-btn-ghost blko-px-4 blko-py-2 blko-btn-size-sm sm:w-auto">← 목록으로</a>
            <form method="post" id="deleteBookForm" th:action="@{'/books/' + ${book.id} + '/delete'}" class="sm:ml-1">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button id="deleteBookButton" type="submit" class="blko-btn-danger blko-px-4 blko-py-2 blko-btn-size-sm sm:w-auto">삭제</button>
            </form>
          </div>
        </aside>

        <main class="blko-card blko-pad-card-lg sm:blko-p-6">
          <div class="blko-mb-4 flex items-center justify-between blko-p-2">
            <div>
              <div class="inline-flex blko-badge">Volumes</div>
              <h2 class="blko-mt-3 blko-title-xl">권별 목록</h2>
              <p class="blko-mt-1 blko-subtitle-sm">각 권 카드를 누르면 팝업으로 세부 정보를 수정할 수 있어요.</p>
            </div>
            <div class="flex items-center blko-p-2">
              <span class="blko-chip blko-chip-tag-lg" th:text="${#lists.size(volumes) + '권'}">0권</span>
              <form method="post" id="deleteVolumesForm" th:action="@{'/books/' + ${book.id} + '/volumes/delete'}" class="relative">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button id="deleteCheckedVolumes" type="submit" class="blko-btn-danger blko-px-4 blko-py-2 blko-btn-size-sm sm:w-auto" disabled>삭제</button>
              </form>
            </div>
          </div>

          <div th:if="${not #lists.isEmpty(volumes)}" class="blko-card-list sm:grid sm:grid-cols-2 xl:grid-cols-3">
            <article th:each="v : ${volumes}"
                 class="blko-panel blko-hover-lift cursor-pointer blko-pad-card-sm sm:blko-p-4 relative"
                 tabindex="0"
                 th:attr="data-volume-id=${v.id},data-volume-seq=${v.seq},data-volume-name=${v.name},data-volume-isbn13=${v.isbn13},data-volume-cover=${v.cover},data-volume-price=${v.price},data-volume-purchased=${v.purchased},data-volume-type=${book.type}"
                 data-volume-card>
              <label class="volume-select-label" style="position:absolute;left:10px;top:10px;z-index:2;background:rgba(255,255,255,.85);border:1px solid var(--bk-border);border-radius:9999px;padding:2px 4px;">
                <input type="checkbox" class="volume-select" aria-label="권 선택"/>
              </label>
              <div class="blko-cover-hover relative mx-auto aspect-[2/3] w-full max-w-[160px] overflow-hidden rounded-[16px] bg-slate-100">
                <div th:if="${v.cover != null and !#strings.isEmpty(v.cover)}" class="h-full w-full">
                  <img th:src="${v.cover}" th:alt="${v.name}" class="h-full w-full object-cover" loading="lazy" decoding="async" fetchpriority="low">
                </div>
                <div th:unless="${v.cover != null and !#strings.isEmpty(v.cover)}" class="absolute inset-0 flex items-center justify-center blko-empty-cover">NO COVER</div>
              </div>
              <h3 class="blko-mt-4 line-clamp-2 blko-title-sm" th:text="${v.name}"></h3>
              <div class="blko-mt-2 blko-space-y-1 blko-subtitle-xs">
                <p th:text="${'권: ' + v.seq}"></p>
                <p th:text="${v.price != null ? '가격: ' + v.price : '가격: -'}"></p>
                <p th:text="${v.purchased ? '구매완료' : '미구매'}"></p>
              </div>
            </article>
          </div>
        </main>
      </div>

      <th:block th:replace="~{fragments/book-detail/dialogs :: bookEditDialog(${book}, ${bookTypes})}"></th:block>
      <th:block th:replace="~{fragments/book-detail/dialogs :: volumeEditDialog()}"></th:block>
      <div th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
  </div>
</div>
<script src="/js/book-detail.js" defer></script>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
