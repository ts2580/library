<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead(${book.name + ' · Bookshelf'})}"></head>
<body class="bookshelf-body">
<div id="bookDetailPage" th:attr="data-book-id=${book.id},data-book-name=${book.name}" class="bookshelf-shell bookshelf-shell-wide bookshelf-py-8">
  <div class="bookshelf-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('book-detail')}"></aside>
    <nav th:replace="~{fragments/layout :: appMobileNav('book-detail')}"></nav>
    <main class="bookshelf-main">
      <div th:replace="~{fragments/layout :: appTopbar('Book Detail', '도서 상세', '책 정보와 권별 목록을 한 화면에서 정리합니다.')}"></div>
      <div th:replace="~{fragments/layout :: flashMessages(${success}, ${error})}"></div>

      <div class="grid bookshelf-p-5 sm:bookshelf-p-6 lg:grid-cols-[340px_1fr]">
        <aside class="bookshelf-card bookshelf-pad-card sm:bookshelf-p-6" id="bookInfoCard"
            th:attr="data-book-name=${book.name},data-book-author=${book.author},data-book-description=${book.description},data-book-cover=${book.cover},data-book-type=${book.type},data-book-totalvolume=${book.totalvolume}">
          <div class="rounded-[22px] border border-slate-200 bg-slate-50 bookshelf-pad-card">
            <div class="bookshelf-cover-hover bookshelf-card-cover-wide relative overflow-hidden rounded-[18px] bg-slate-100 cursor-pointer" data-book-cover-trigger tabindex="0" role="button" aria-label="책 정보 수정">
              <div th:if="${book.cover != null and !#strings.isEmpty(book.cover)}" class="h-full w-full">
                <img th:src="${book.cover}" th:alt="${book.name}" class="h-full w-full object-cover" loading="lazy" decoding="async" fetchpriority="low">
              </div>
              <div th:unless="${book.cover != null and !#strings.isEmpty(book.cover)}" class="absolute inset-0 flex items-center justify-center bookshelf-empty-cover">NO COVER</div>
            </div>
          </div>
          <h1 class="bookshelf-mt-4 sm:bookshelf-mt-5 bookshelf-title-responsive-xl" th:text="${book.name}"></h1>
          <div class="bookshelf-mt-3 sm:bookshelf-mt-4 bookshelf-space-y-2 bookshelf-subtitle-sm">
            <p><span class="bookshelf-detail-label">저자</span> · <span th:text="${book.author}"></span></p>
            <p><span class="bookshelf-detail-label">총권수</span> · <span th:text="${book.totalvolume}"></span></p>
            <p><span class="bookshelf-detail-label">카테고리</span> · <span th:text="${book.type}"></span></p>
            <p><span class="bookshelf-detail-label">동기화</span> · <span th:text="${book.sync}"></span></p>
          </div>
          <p class="bookshelf-mt-4 rounded-[18px] border border-slate-200 bookshelf-p-4 bookshelf-subtitle-sm" th:text="${book.description ?: '설명이 없습니다.'}"></p>
          <div class="bookshelf-mt-3 bookshelf-subtitle-xs">카드를 누르면 책 정보를 수정할 수 있습니다.</div>
          <div class="bookshelf-detail-actions">
            <a href="/books" class="bookshelf-btn-ghost bookshelf-btn-size-sm bookshelf-detail-action-btn bookshelf-detail-back-btn">← 목록으로</a>
            <form method="post" id="enrichBookInfoForm" th:action="@{/books/{id}/enrich-info(id=${book.id})}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button id="enrichBookInfoButton" type="submit" class="bookshelf-btn bookshelf-btn-size-sm bookshelf-detail-action-btn">저자/설명 넣기</button>
            </form>
            <form method="post" id="deleteBookForm" th:action="@{/books/{id}/delete(id=${book.id})}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button id="deleteBookButton" type="submit" class="bookshelf-btn-danger bookshelf-btn-size-sm bookshelf-detail-action-btn">삭제</button>
            </form>
          </div>
        </aside>

        <main class="bookshelf-card bookshelf-pad-card-lg sm:bookshelf-p-6">
          <div class="bookshelf-mb-4 bookshelf-p-2">
            <div>
              <div class="inline-flex bookshelf-badge">Volumes</div>
              <h2 class="bookshelf-mt-3 bookshelf-title-xl">권별 목록</h2>
              <p class="bookshelf-mt-1 bookshelf-subtitle-sm">각 권 카드를 누르면 팝업으로 세부 정보를 수정할 수 있습니다.</p>
            </div>
            <div class="bookshelf-volume-toolbar">
              <span class="bookshelf-chip bookshelf-chip-tag-lg bookshelf-volume-count" th:text="${#lists.size(volumes) + '권'}">0권</span>
              <form method="post" id="deleteVolumesForm" th:action="@{/books/{id}/volumes/delete(id=${book.id})}" class="relative">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button id="deleteCheckedVolumes" type="submit" class="bookshelf-btn-danger bookshelf-btn-size-sm bookshelf-volume-delete-btn" disabled>삭제</button>
              </form>
            </div>
          </div>

          <div th:if="${not #lists.isEmpty(volumes)}" class="bookshelf-card-list sm:grid sm:grid-cols-2 xl:grid-cols-3">
            <article th:each="v : ${volumes}"
                 class="bookshelf-panel bookshelf-hover-lift bookshelf-pad-card-sm sm:bookshelf-p-4 relative"
                 th:attr="data-volume-id=${v.id},data-volume-seq=${v.seq},data-volume-side-story=${v.sideStory()},data-volume-name=${v.name},data-volume-isbn13=${v.isbn13},data-volume-cover=${v.cover},data-volume-price=${v.price},data-volume-description=${v.description},data-volume-purchased=${v.purchased},data-volume-no-need-to-buy=${v.noNeedToBuy},data-volume-type=${book.type}"
                 data-volume-card>
              <label class="volume-select-label" style="position:absolute;left:10px;top:10px;z-index:2;background:rgba(255,255,255,.85);border:1px solid var(--bk-border);border-radius:9999px;padding:2px 4px;">
                <input type="checkbox" class="volume-select" form="deleteVolumesForm" aria-label="권 선택"/>
              </label>
              <div class="bookshelf-cover-hover bookshelf-card-cover-wide relative w-full overflow-hidden rounded-[16px] bg-slate-100 cursor-pointer" data-volume-cover-trigger tabindex="0" role="button" aria-label="권 세부 내역 수정">
                <div th:if="${v.cover != null and !#strings.isEmpty(v.cover)}" class="h-full w-full">
                  <img th:src="${v.cover}" th:alt="${v.name}" class="h-full w-full object-cover" loading="lazy" decoding="async" fetchpriority="low">
                </div>
                <div th:unless="${v.cover != null and !#strings.isEmpty(v.cover)}" class="absolute inset-0 flex items-center justify-center bookshelf-empty-cover">NO COVER</div>
              </div>
              <h3 class="bookshelf-mt-4 line-clamp-2 bookshelf-title-sm" th:text="${v.name}"></h3>
              <div class="bookshelf-mt-2 bookshelf-space-y-1 bookshelf-subtitle-xs">
                <p th:text="${v.sideStory() ? '구분: 외전' : '권: ' + v.seq}"></p>
                <p th:text="${v.price != null ? '가격: ' + v.price : '가격: -'}"></p>
                <p th:text="${v.noNeedToBuy ? '살 필요 없음' : (v.purchased ? '구매완료' : '미구매')}"></p>
              </div>
              <p class="bookshelf-mt-2 text-xs text-slate-500 line-clamp-2" th:if="${v.description != null and !#strings.isEmpty(v.description)}" th:text="${v.description}"></p>
            </article>
          </div>
        </main>
      </div>

      <th:block th:replace="~{fragments/book-detail/dialogs :: bookEditDialog(${book}, ${bookTypes})}"></th:block>
      <th:block th:replace="~{fragments/book-detail/dialogs :: volumeEditDialog()}"></th:block>
      <div th:replace="~{fragments/layout :: appFooter()}"></div>
    </main>
  </div>
</div>
<script src="/js/book-detail.js?v=2.1" defer></script>
<script src="/js/cover-preview.js" defer></script>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
