<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('지점 재고 상세 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-shell bookshelf-shell-wide bookshelf-py-8">
  <div class="bookshelf-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('branch-detail')}"></aside>
    <main class="bookshelf-main">
      <div th:replace="~{fragments/layout :: appTopbar('Branch Detail', branchName, '지점 재고 카드를 한 장씩 편하게 살펴봐요.')}"></div>

      <section class="grid bookshelf-p-4 sm:grid-cols-3">
        <div class="bookshelf-kpi bookshelf-pad-card-lg"><div class="bookshelf-kpi-label">전체 재고</div><div class="bookshelf-mt-2 bookshelf-title-2xl" th:text="${totalCount}">0</div><div class="bookshelf-mt-1 bookshelf-subtitle-sm">이 지점에 등록된 전체 재고 수예요.</div></div>
        <div class="bookshelf-kpi bookshelf-pad-card-lg"><div class="bookshelf-kpi-label">가격 입력</div><div class="bookshelf-mt-2 bookshelf-title-2xl" th:text="${pricedCount}">0</div><div class="bookshelf-mt-1 bookshelf-subtitle-sm">가격 정보가 채워진 재고만 따로 보여줘요.</div></div>
        <div class="bookshelf-kpi bookshelf-pad-card-lg"><div class="bookshelf-kpi-label">재고 합계</div><div class="bookshelf-mt-2 bookshelf-title-2xl" th:text="${#numbers.formatInteger(totalAmount, 0, 'COMMA') + '원'}">0원</div><div class="bookshelf-mt-1 bookshelf-subtitle-sm">입력된 가격 기준으로 계산한 합계예요.</div></div>
      </section>

      <section class="bookshelf-card bookshelf-pad-card-lg sm:bookshelf-p-6">
        <div class="bookshelf-mb-4 flex flex-col bookshelf-p-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h2 class="bookshelf-title-xl">재고 카드</h2>
            <p class="bookshelf-mt-1 bookshelf-subtitle-sm">권별 상태와 가격을 카드 형태로 정리했어요.</p>
          </div>
          <a href="/dashboard/branches" class="bookshelf-btn-ghost bookshelf-px-4 bookshelf-py-2 bookshelf-btn-size-sm sm:w-auto">목록으로 돌아가기</a>
        </div>

        <div th:if="${#lists.isEmpty(stocks)}" class="text-center bookshelf-py-10 bookshelf-subtitle">이 지점에는 아직 표시할 재고가 없어요.</div>

        <div th:if="${not #lists.isEmpty(stocks)}" class="bookshelf-card-list sm:grid sm:grid-cols-2 lg:grid-cols-4">
          <article th:each="s : ${stocks}" class="bookshelf-panel bookshelf-hover-lift bookshelf-pad-card-sm sm:bookshelf-p-4 h-full flex flex-col">
            <div class="bookshelf-cover-hover relative mx-auto bookshelf-mt-3 aspect-[2/3] w-full max-w-[190px] overflow-hidden rounded-[16px] bg-slate-100">
              <a th:if="${s.bookId() > 0}" th:href="@{'/books/' + ${s.bookId()}}" class="block h-full w-full cursor-pointer" aria-label="책 상세 보기">
                <img th:if="${s.cover() != null and !#strings.isEmpty(s.cover())}" th:src="${s.cover()}" alt="cover" class="h-full w-full object-cover" loading="lazy"/>
              </a>
              <img th:unless="${s.bookId() > 0 and s.cover() != null and !#strings.isEmpty(s.cover())}" th:if="${s.cover() != null and !#strings.isEmpty(s.cover())}" th:src="${s.cover()}" alt="cover" class="h-full w-full object-cover" loading="lazy"/>
              <div th:if="${s.cover() == null or #strings.isEmpty(s.cover())}" class="absolute inset-0 flex items-center justify-center bookshelf-empty-cover">NO COVER</div>
            </div>
            <div class="bookshelf-mt-4 text-sm flex-1">
              <p class="bookshelf-title-base" th:text="${s.volumeTitle() != null ? s.volumeTitle() : s.bookTitle()}"></p>
              <p class="bookshelf-mt-1 bookshelf-subtitle" th:text="${s.bookTitle()}"></p>
              <p class="bookshelf-mt-1 bookshelf-subtitle-xs" th:text="${s.isbn13()}"></p>
              <div class="bookshelf-mt-3 flex flex-wrap items-center bookshelf-p-2 text-xs mt-auto">
                <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'가격 ' + (s.price() != null ? s.price() + '원' : '-')} "></span>
                <span class="bookshelf-chip bookshelf-chip-tag" th:text="${'등급 ' + (s.grade() != null ? s.grade() : '-')} "></span>
                <a th:if="${s.purchaseLink() != null and !#strings.isEmpty(s.purchaseLink())}" th:href="${s.purchaseLink()}" target="_blank" class="bookshelf-btn-soft bookshelf-px-2-5 bookshelf-py-1 bookshelf-btn-size-xs sm:w-auto">바로 구매</a>
              </div>
            </div>
          </article>
        </div>
      </section>

      <div th:replace="~{fragments/layout :: appFooter()}"></div>
      <script th:replace="~{fragments/layout :: toastScript()}" defer></script>
    </main>
  </div>
</div>
</body>
</html>
