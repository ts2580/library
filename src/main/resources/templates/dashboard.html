<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('대시보드 · Bookshelf')}"></head>
<body class="blko-body text-slate-800">
<div class="blko-shell blko-shell-wide py-8">
    <div class="blko-app-frame">
        <aside th:replace="~{fragments/layout :: appSidebar('dashboard')}"></aside>
        <main class="blko-main">
            <div th:replace="~{fragments/layout :: appTopbar(null, 'Bookshelf 대시보드', '읽고, 찾고, 모으는 흐름을 한 화면 안에서 자연스럽게 이어가요.')}"></div>

            <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">Now</div>
                    <div class="mt-2 text-lg font-bold blko-title" th:text="${member != null ? member.username() : 'Guest'}">member</div>
                    <div class="mt-1 text-sm blko-subtitle">지금 이 공간을 열고 있는 사용자예요.</div>
                </div>
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">Library Size</div>
                    <div class="mt-2 text-2xl font-bold blko-title" th:text="${bookCount}">0</div>
                    <div class="mt-1 text-sm blko-subtitle">쌓여 있는 권 수를 한눈에 확인해요.</div>
                </div>
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">Flow</div>
                    <div class="mt-2 text-lg font-bold blko-title">Collect · Organize</div>
                    <div class="mt-1 text-sm blko-subtitle">책장과 검색, 재고 흐름이 하나로 이어져요.</div>
                </div>
                <div class="blko-kpi p-5">
                    <div class="text-xs uppercase tracking-wide blko-subtitle">Branch</div>
                    <div class="mt-2 text-lg font-bold blko-title">Ready</div>
                    <div class="mt-1 text-sm blko-subtitle">지점 재고 페이지에서 일괄 갱신과 진행 상태를 함께 볼 수 있어요.</div>
                </div>
            </section>

            <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                <a href="/books" class="blko-card blko-hover-lift group p-6">
                    <h2 class="text-xl font-semibold blko-title">내 책장</h2>
                    <p class="mt-2 text-sm blko-subtitle">모아둔 책과 권별 흐름을 조용히 훑어봐요.</p>
                    <div class="mt-6 inline-flex blko-btn-soft px-4 py-2 text-sm sm:w-auto">책장 열기</div>
                </a>
                <a href="/dashboard/branches" class="blko-card blko-hover-lift group p-6">
                    <h2 class="text-xl font-semibold blko-title">지점 재고</h2>
                    <p class="mt-2 text-sm blko-subtitle">재고 분석, 일괄 갱신, 진행률 확인을 한 곳에서 처리해요.</p>
                    <div class="mt-6 inline-flex blko-btn-soft px-4 py-2 text-sm sm:w-auto">재고 보기</div>
                </a>
                <a href="/products" class="blko-card blko-hover-lift group p-6">
                    <h2 class="text-xl font-semibold blko-title">상품 검색</h2>
                    <p class="mt-2 text-sm blko-subtitle">내 책장과 외부 검색 결과를 나란히 비교해요.</p>
                    <div class="mt-6 inline-flex blko-btn-soft px-4 py-2 text-sm sm:w-auto">검색 시작</div>
                </a>
            </section>

            <div th:replace="~{fragments/layout :: appFooter()}" ></div>
        </main>
    </div>
</div>
<script th:replace="~{fragments/layout :: toastScript()}" defer></script>
</body>
</html>
