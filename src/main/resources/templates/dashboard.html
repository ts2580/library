<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: appHead('대시보드 · Bookshelf')}"></head>
<body class="bookshelf-body">
<div class="bookshelf-shell bookshelf-shell-wide bookshelf-py-8">
  <div class="bookshelf-app-frame">
    <aside th:replace="~{fragments/layout :: appSidebar('dashboard')}"></aside>
    <nav th:replace="~{fragments/layout :: appMobileNav('dashboard')}"></nav>
    <main class="bookshelf-main bookshelf-dashboard-main">
      <div th:replace="~{fragments/layout :: appTopbar(null, 'Bookshelf 대시보드', null)}"></div>

      <section class="bookshelf-dashboard-section grid bookshelf-dashboard-kpi-grid bookshelf-p-5 sm:grid-cols-3">
        <div class="bookshelf-kpi bookshelf-pad-card-lg">
          <div class="bookshelf-kpi-label">Library Size</div>
          <div class="bookshelf-mt-2 bookshelf-title-2xl" th:text="${bookCount}">0</div>
          <div class="bookshelf-mt-1 bookshelf-subtitle-sm">전체 권 수</div>
        </div>
        <div class="bookshelf-kpi bookshelf-pad-card-lg">
          <div class="bookshelf-kpi-label">구매 금액</div>
          <div class="bookshelf-mt-2 bookshelf-title-2xl" th:text="${#numbers.formatInteger(purchasedAmount, 0, 'COMMA') + '원'}">0원</div>
          <div class="bookshelf-mt-1 bookshelf-subtitle-sm">구매 완료 권 가격 합계</div>
        </div>
        <div class="bookshelf-kpi bookshelf-pad-card-lg">
          <div class="bookshelf-kpi-label">구매 예정 금액</div>
          <div class="bookshelf-mt-2 bookshelf-title-2xl" th:text="${#numbers.formatInteger(plannedPurchaseAmount, 0, 'COMMA') + '원'}">0원</div>
          <div class="bookshelf-mt-1 bookshelf-subtitle-sm">미구매 권 가격 합계</div>
        </div>
      </section>

      <section class="bookshelf-dashboard-section bookshelf-card bookshelf-p-5 sm:bookshelf-p-5">
        <div class="bookshelf-mb-3 sm:bookshelf-mb-4">
          <h2 class="bookshelf-title-lg">카테고리별 권수와 금액</h2>
        </div>
        <div th:if="${#lists.isEmpty(categorySummaries)}" class="bookshelf-empty bookshelf-p-6 text-center bookshelf-subtitle-sm">표시할 카테고리 데이터가 없습니다.</div>
        <div th:unless="${#lists.isEmpty(categorySummaries)}" id="categoryChartWrap" class="bookshelf-mt-3 rounded-[20px] border border-slate-200 bookshelf-dashboard-chart-wrap" style="height: 420px; min-height: 420px;">
          <canvas id="categoryChart"></canvas>
        </div>
      </section>

      <div th:replace="~{fragments/layout :: appFooter()}" ></div>
      <script th:inline="javascript">
        window.BookshelfDashboard = {
          categoryLabels: /*[[${categoryLabels}]]*/ [],
          categoryCounts: /*[[${categoryCounts}]]*/ [],
          categoryAmounts: /*[[${categoryAmounts}]]*/ []
        };
      </script>
      <script src="/js/vendor/chart.umd.min.js"></script>
      <script src="/js/dashboard.js" defer></script>
      <script th:replace="~{fragments/layout :: toastScript()}" defer></script>
    </main>
  </div>
</div>
</body>
</html>
