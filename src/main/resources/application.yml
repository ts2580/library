spring:
  application:
    name: bookshelf
  datasource:
    url: jdbc:sqlite:./data/bookshelf.sqlite?foreign_keys=on&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA foreign_keys=ON
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false

app:
  db:
    enabled: ${APP_DB_ENABLED:true}
  registration:
    enabled: ${REGISTRATION:${APP_REGISTRATION_ENABLED:false}}

aladin:
  ttb-key: ${ALADIN_TTB_KEY:ttbtrstyq0151001}

server:
  port: ${SERVER_PORT:25647}
  servlet:
    session:
      timeout: 6h
      cookie:
        max-age: 1d
