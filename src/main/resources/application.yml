spring:
  application:
    name: bookshelf
  datasource:
    url: jdbc:sqlite:./data/bookshelf.sqlite?foreign_keys=on&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA foreign_keys=ON
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false

app:
  registration:
    enabled: ${REGISTRATION:${APP_REGISTRATION_ENABLED:false}}
  security:
    remember-me-key: ${APP_REMEMBER_ME_KEY:bookshelf-dev-remember-me-change-me}

aladin:
  ttb-key: ${ALADIN_TTB_KEY:}

server:
  port: ${SERVER_PORT:25647}
  servlet:
    session:
      timeout: 30d
      cookie:
        max-age: 30d
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

---
spring:
  config:
    activate:
      on-profile: prod
  sql:
    init:
      mode: never
  thymeleaf:
    cache: true
