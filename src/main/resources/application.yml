spring:
  application:
    name: bookshelf
  datasource:
    url: jdbc:sqlite:./data/bookshelf.sqlite?foreign_keys=on&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA foreign_keys=ON
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 501MB

app:
  covers:
    storage-dir: ${BOOKSHELF_COVER_DIR:./data/covers}
  registration:
    enabled: ${REGISTRATION:${APP_REGISTRATION_ENABLED:false}}
  security:
    remember-me-key: ${APP_REMEMBER_ME_KEY:bookshelf-dev-remember-me-change-me}

aladin:
  ttb-key: ${ALADIN_TTB_KEY:}
  request:
    min-interval-ms: ${ALADIN_MIN_REQUEST_INTERVAL_MS:1000}
    max-attempts: ${ALADIN_MAX_ATTEMPTS:3}
    initial-backoff-ms: ${ALADIN_INITIAL_BACKOFF_MS:2000}
    max-backoff-ms: ${ALADIN_MAX_BACKOFF_MS:30000}

server:
  forward-headers-strategy: framework
  port: ${SERVER_PORT:25647}
  servlet:
    session:
      timeout: 30d
      cookie:
        max-age: 30d
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

logging:
  file:
    name: ${BOOKSHELF_APP_LOG_FILE:./data/logs/bookshelf.log}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 200MB

---
spring:
  config:
    activate:
      on-profile: prod
  sql:
    init:
      mode: never
  thymeleaf:
    cache: true
